<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Organograma Movimento Tremembé</title>
<link rel="icon" href="https://misericordia.com.br/wp-content/uploads/2019/11/16x16px.png" type="image/png" />

<style>

/* ===============================
   BOTÃO VOLTAR
================================*/
.btn-voltar {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: #f5f5f7;
  color: #111;
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s ease;
  margin-bottom: 1.5rem;
}

.btn-voltar:hover {
  background: #2d6cdf;
  color: #fff;
  border-color: #2d6cdf;
}

@media (prefers-color-scheme: dark) {
  .btn-voltar {
    background: #141416;
    color: #f1f1f1;
    border-color: rgba(255,255,255,0.15);
  }
  .btn-voltar:hover {
    background: #5a8dff;
    color: #fff;
  }
}

/* ===============================
   FIXAR HEADER WEB NO TOPO
================================*/

#web-header{
    position:sticky;
    top:0;
    backdrop-filter:blur(6px);
    background:rgba(255,255,255,0.75);
	z-index: 9999 !important;
}

/* ===============================
   VARIÁVEIS E TEMA
================================*/
:root{
  --bg:#ffffff;
  --text:#111;
  --muted:#666;
  --card:#f5f5f7;
  --brand:#2d6cdf;
  --warn:#ffc107;
  --danger:#dc3545;
  --radius:10px;
  --space-1:0.25rem;
  --space-2:0.5rem;
  --space-3:0.75rem;
  --space-4:1rem;
  --space-5:1.25rem;
  --space-6:1.5rem;
  --space-8:2rem;
  --font-base:16px;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0b0b0c;
    --text:#f1f1f1;
    --muted:#aaa;
    --card:#141416;
    --brand:#5a8dff;
  }
}

/* ===============================
   BASE
================================*/
*{ box-sizing:border-box; }
html, body { min-height:100%; height:auto; }

body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  font-size: var(--font-base);
  line-height:1.45;
  color:var(--text);
  background:var(--bg);
  margin:0;
  padding: var(--space-6) var(--space-4) var(--space-8);
}

h1,h2,h3{ margin:0 0 var(--space-4); line-height:1.2; }
h1{ font-size:1.6rem; font-weight:700; }

.container{ max-width:1100px; margin:0 auto; }

/* ===============================
   CABEÇALHO WEB
================================*/
#web-header{
  display:flex;
  gap: var(--space-4);
  align-items:center;
  justify-content:center;
  padding: var(--space-4);
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  border-bottom: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
  backdrop-filter: blur(6px);
}
#web-header img{ width:120px; height:auto; }

/* ===============================
   MENU RODAPÉ
================================*/
#menu-rodape{
  position: fixed;
  inset: auto 0 0 0;
  background: color-mix(in srgb, var(--card) 80%, transparent);
  border-top: 1px solid color-mix(in srgb, var(--text) 15%, transparent);
  padding: 8px;
  box-shadow: 0 -2px 6px rgba(0,0,0,0.08);
  z-index: 1000;
}

.menu-rodape-content{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  max-width: 1100px;
  margin: 0 auto;
  flex-wrap: wrap;
}

.field-inline{
  display: flex;
  align-items: center;
  gap: 8px;
}

#menu-rodape label{ font-size: 0.9rem; font-weight: 600; }
#menu-rodape input{ padding: 6px 10px; font-size: 0.9rem; min-width: 140px; border: 1px solid color-mix(in srgb, var(--text) 18%, transparent); background: var(--bg); color: var(--text); border-radius: 8px; }

.rodape-actions{
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.btn_rodape{
  padding: 8px 12px;
  font-size: 0.9rem;
  border-radius: 8px;
  cursor: pointer;
  background: var(--brand);
  color:#fff;
  border: none;
}

.sec-btn{
  padding: 8px 12px;
  font-size: 0.9rem;
  border-radius: 8px;
  cursor: pointer;
  background: var(--danger);
  color:#fff;
  border: none;
}

body { padding-bottom: 200px !important; }

@media print{
  #menu-rodape, .btn-voltar, #web-header { display: none !important; }
}
</style>
</head>

<body>

<div class="container">

  <a href="../" class="btn-voltar">← Voltar para Home</a>

  <div id="web-header" role="banner" aria-label="Topo">
    <img src="https://misericordia.com.br/wp-content/uploads/2023/08/alianca_logo-header.png"
         alt="Logo da Aliança">
    <h1 id="titulo-web">Organograma Movimento Tremembé</h1>
  </div>

  <p>Página do Organograma - Conteúdo em desenvolvimento</p>

</div>

<div id="menu-rodape" role="region" aria-label="Menu rodapé">
  <form class="menu-rodape-content">
    <div class="field-inline">
      <label for="evangelizacao">Organograma:</label>
      <input type="text" id="evangelizacao" placeholder="Nome">
    </div>
    <div class="rodape-actions">
      <button type="button" class="btn_rodape">Opções</button>
    </div>
  </form>
</div>

<script>
const TITLE_KEY = "organograma_titulo";
const TITLE_DEFAULT = "Organograma Movimento Tremembé";

function getTitulo(){
  try {
    const v = (localStorage.getItem(TITLE_KEY) || "").trim();
    return v || TITLE_DEFAULT;
  } catch { return TITLE_DEFAULT; }
}

function setTitulo(v){
  try { localStorage.setItem(TITLE_KEY, (v||"").trim()); } catch {}
}

function atualizarTitulos(){
  const h1 = document.getElementById("titulo-web");
  if (h1) h1.textContent = getTitulo();
  document.title = getTitulo();
}

document.addEventListener("DOMContentLoaded", () => {
  const t = getTitulo();
  const inp = document.getElementById("evangelizacao");
  if (inp) inp.value = (t === TITLE_DEFAULT ? "" : t);
  atualizarTitulos();
});
</script>

</body>
</html>
