<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carregando...</title>

<!-- ✅ FAVICON DINÂMICO -->
<link id="app-favicon" rel="icon">

<!-- ✅ CONFIG GLOBAL -->
../config/js/config.js

<style>
* {
  box-sizing: border-box;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

/* ✅ BACKGROUND */
body {
  background: #f0f2f5;
  height: 100vh;
}

/* LAYOUT */
.wrapper {
  display: flex;
  height: 100vh;
}

.left, .right {
  width: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== ESQUERDA ===== */
.content-left {
  display: flex;
  align-items: center;
  gap: 12px;
  transform: translateX(40px);
}

.text {
  font-size: 56px;
  line-height: 1.1;
  font-weight: 700;
  color: #1c1e21;
}

.text span {
  color: #1877f2;
}

.text-wrapper {
  display: flex;
  flex-direction: column;
}

.author {
  font-size: 22px;
  margin-top: 6px;
}

/* ✅ LOGO DINÂMICO */
.logo-hero {
  width: 250px;
  cursor: pointer;
  filter: drop-shadow(0 10px 25px rgba(0,0,0,0.2));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0); }
}

/* ===== DIREITA ===== */
.login-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.login-container {
  width: 360px;
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #1877f2;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #dddfe2;
  font-size: 16px;
}

input:focus {
  border-color: #1877f2;
  outline: none;
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  border: none;
}

.btn-primary {
  background: linear-gradient(90deg, #1877f2, #166fe5);
  color: white;
  margin-bottom: 10px;
}

.link {
  display: block;
  text-align: center;
  margin: 15px 0;
  padding: 14px;
  border-radius: 25px;
  color: #1877f2;
  text-decoration: none;
}

.btn-outline {
  border: 1px solid #1877f2;
  color: #1877f2;
  background: transparent;
}

.footer {
  margin-top: 15px;
  font-size: 14px;
  text-align: center;
}

/* ✅ WATERMARK */
.watermark {
  position: fixed;
  bottom: 10px;
  right: 15px;
  opacity: 0.2;
  font-size: 12px;
}

/* MOBILE */
@media (max-width: 900px) {
  .wrapper {
    flex-direction: column;
  }

  .left, .right {
    width: 100%;
  }

  .text {
    font-size: 32px;
  }

  .logo-hero {
    width: 180px;
  }
}
</style>
</head>

<body>

<!-- ✅ WATERMARK -->
<div id="watermark" class="watermark">EM DESENVOLVIMENTO</div>

<div class="wrapper">

  <!-- ESQUERDA -->
  <div class="left">
    <div class="content-left">

      <div class="text-wrapper">
        <div class="text">
          "Só amamos <br>
          aquilo que <br>
          <span>conhecemos"</span>
        </div>

        <div class="author">
          - Santo Agostinho
        </div>
      </div>

      <!-- ✅ LOGO DINÂMICO + LINK PRA HOME -->
      <img id="logo-hero" class="logo-hero">

    </div>
  </div>

  <!-- DIREITA -->
  <div class="right">

    <div class="login-wrapper">

      <div class="login-container">

        <h2 id="login-title">Carregando...</h2>

        <form>
          <input type="email" placeholder="Email">
          <input type="password" placeholder="Senha">

          <button class="btn btn-primary">Entrar</button>

          #Esqueceu a senha?</a>

          <button type="button" class="btn btn-outline">
            Criar nova conta
          </button>
        </form>

      </div>

      <!-- ✅ FOOTER DINÂMICO -->
      <div class="footer">
        <p>
          <strong id="brand-nome">...</strong> |
          <span id="footer-projeto">...</span><br>
          <small id="footer-copy"></small>
        </p>
      </div>

    </div>

  </div>

</div>

<script>
/* ✅ AGUARDA CONFIG */
document.addEventListener("DOMContentLoaded", () => {

  if (!window.APP_CONFIG) return;

  const cfg = window.APP_CONFIG;

  // ✅ TITLE
  document.title = cfg.nomeProjeto;

  // ✅ LOGIN TITLE
  document.getElementById("login-title").textContent =
    "Entrar no " + cfg.nomeProjeto;

  // ✅ LOGO + LINK HOME
  const logo = document.getElementById("logo-hero");
  logo.src = cfg.logo;

  logo.onclick = () => {
    window.location.href = "../index.html";
  };

  // ✅ FAVICON
  document.getElementById("app-favicon").href = cfg.favicon;

  // ✅ FOOTER
  document.getElementById("brand-nome").textContent = cfg.brand;
  document.getElementById("footer-projeto").textContent = cfg.nomeProjeto;
  document.getElementById("footer-copy").textContent =
    "© " + cfg.ano + " • Desenvolvido por " + cfg.autor;

  // ✅ WATERMARK (DEV/PROD)
  const watermark = document.getElementById("watermark");
  if (cfg.env === "prod") {
    watermark.style.display = "none";
  }

});
</script>

</body>
</html>
