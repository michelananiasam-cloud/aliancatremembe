<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carregando...</title>

<!-- ✅ FAVICON -->
<link id="app-favicon" rel="icon">

<!-- ✅ BASE PATH (necessário para login) -->
<script>
  window.BASE_PATH = "../";
</script>

<!-- ✅ CSS GLOBAL -->
<link rel="stylesheet" href="../config/css/styles.css">

<!-- ✅ CONFIG GLOBAL -->
<script src="../config/js/config.js" defer></script>

</head>

<body>

<!-- ✅ WATERMARK (texto vem do config) -->
<div id="watermark" class="watermark"></div>

<div class="wrapper">

  <!-- ESQUERDA -->
  <div class="left">
    <div class="content-left">

      <div class="text-wrapper">
        <div class="text">
          "Só amamos <br>
          aquilo que <br>
          <span>conhecemos"</span>
        </div>

        <div class="author">
          - Santo Agostinho
        </div>
      </div>

      <!-- ✅ LOGO DINÂMICA -->
      <img id="logo-hero" class="logo-hero" alt="Logo">

    </div>
  </div>

  <!-- DIREITA -->
  <div class="right">

    <div class="login-wrapper">

      <div class="login-container">

        <!-- ✅ PREENCHIDO PELO CONFIG -->
        <h2 id="login-title">
          Entrar no <span id="login-nome"></span>
        </h2>

        <form>
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Senha" required>

          <button class="btn btn-primary" type="submit">
            Entrar
          </button>

          <a href="#" class="link">Esqueceu a senha?</a>

          <button type="button" class="btn btn-outline">
            Criar nova conta
          </button>
        </form>

      </div>

      <!-- ✅ FOOTER DINÂMICO -->
      <div class="footer">
        <p>
          <strong id="brand-nome"></strong> |
          <span id="footer-projeto"></span><br>
          <small id="footer-copy"></small>
        </p>
      </div>

    </div>

  </div>

</div>

</body>
</html>
