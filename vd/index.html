<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Embed Tester</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin: 40px auto;
    padding: 20px;
    background: #f5f5f5;
}

h1 {
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-bottom: 15px;
    box-sizing: border-box;
}

.buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

button {
    padding: 12px 20px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    color: white;
    font-weight: bold;
}

.btn-normal {
    background: #d32f2f;
}

.btn-nocookie {
    background: #1976d2;
}

.url-box {
    background: #eee;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 20px;
    word-break: break-all;
}

.player {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
}

.player iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>
<body>

<div class="card">

    <h1>YouTube Embed Tester</h1>

    <input
        id="youtubeUrl"
        type="text"
        placeholder="Cole a URL do YouTube aqui"
    >

    <div class="buttons">
        <button class="btn-normal" onclick="gerarEmbed(false)">
            Testar Embed Padrão
        </button>

        <button class="btn-nocookie" onclick="gerarEmbed(true)">
            Testar NoCookie
        </button>
    </div>

    <div id="embedUrl" class="url-box">
        URL de embed aparecerá aqui...
    </div>

    <div class="player">
        <iframe
            id="player"
            allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
        </iframe>
    </div>

</div>

<script>
function extrairVideoId(url) {

    const patterns = [
        /youtube\.com\/watch\?v=([^&]+)/,
        /youtu\.be\/([^?&]+)/,
        /youtube\.com\/embed\/([^?&]+)/
    ];

    for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match) {
            return match[1];
        }
    }

    return null;
}

function gerarEmbed(useNoCookie) {

    const input = document.getElementById("youtubeUrl").value.trim();

    const videoId = extrairVideoId(input);

    if (!videoId) {
        alert("Não foi possível identificar o ID do vídeo.");
        return;
    }

    const baseUrl = useNoCookie
        ? "https://www.youtube-nocookie.com/embed/"
        : "https://www.youtube.com/embed/";

    const embedUrl =
        `${baseUrl}${videoId}?rel=0&modestbranding=1`;

    document.getElementById("player").src = embedUrl;
    document.getElementById("embedUrl").textContent = embedUrl;
}
</script>

</body>
</html>
