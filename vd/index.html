<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Seguro - Teste yt-dlp</title>

<style>

*{
    box-sizing:border-box;
    user-select:none;
    -webkit-user-select:none;
}

body{
    font-family:Arial,sans-serif;
    max-width:1200px;
    margin:20px auto;
    padding:20px;
    background:#f5f5f5;
}

textarea{
    width:100%;
    height:250px;
    font-family:Consolas,monospace;
}

button{
    margin-top:10px;
    padding:12px 24px;
    cursor:pointer;
}

.card{
    display:none;
    margin-top:20px;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.player-wrapper{
    position:relative;
    background:#000;
}

video{
    width:100%;
    display:block;
    background:#000;
    transition:filter .3s ease;
}

#bloqueio{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0);
    z-index:1000;
    pointer-events:none;
    transition:background .3s ease;
}

#watermark{

    position:absolute;

    top:30%;
    left:25%;

    z-index:2147483647;

    color:rgba(255,255,255,.55);

    font-size:24px;
    font-weight:bold;

    text-align:center;

    text-shadow:
        2px 2px 5px rgba(0,0,0,.8);

    transform:rotate(-25deg);

    pointer-events:none;

    transition:all .6s ease;
}

.info{
    padding:20px;
}

.meta{
    margin-bottom:10px;
}

.error{
    color:red;
    margin-top:10px;
}

#mensagemProgresso{
    margin-top:10px;
    color:#666;
    font-size:14px;
}

#btnNext{
    display:none;
}

</style>

</head>

<body>

<h1>Player Seguro - Teste yt-dlp</h1>

<textarea
    id="jsonInput"
    placeholder="Cole aqui o JSON">
</textarea>

<br>

<button onclick="carregarVideo()">
    Carregar Vídeo
</button>

<div id="erro" class="error"></div>

<div id="card" class="card">

    <div class="player-wrapper">

        <div id="bloqueio"></div>

        <div id="watermark"></div>

        <video
            id="player"
            controls
            controlsList="nodownload noplaybackrate"
            disablePictureInPicture
            disableRemotePlayback
            preload="metadata"
            playsinline
            draggable="false">
        </video>

    </div>

    <div class="info">

        <h2 id="titulo"></h2>

        <div class="meta">
            Canal:
            <strong id="canal"></strong>
        </div>

        <div class="meta">
            Duração:
            <strong id="duracao"></strong>
        </div>

        <div class="meta">
            YouTube ID:
            <strong id="youtubeId"></strong>
        </div>

        <div class="meta">
            Aproveitamento:
            <strong id="progresso">0%</strong>
        </div>
		
		<div
			id="mensagemProgresso"
			style="
				margin-top:10px;
				color:#666;
				font-size:14px;
			">
		</div>
        <button id="btnNext">
            Próximo
        </button>

    </div>

</div>

<script>

let PercentualAssistido = 90;
let watermarkModoAlerta = false;
let intervalWatermark = null;

let VideoConcluido = false;
let segundosAssistidos = 0;

function formatarDuracao(segundos){

    if(!segundos) return "";

    const h =
        Math.floor(segundos / 3600);

    const m =
        Math.floor(
            (segundos % 3600) / 60
        );

    const s =
        segundos % 60;

    if(h > 0){

        return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

    }

    return `${m}:${String(s).padStart(2,"0")}`;
}

function carregarVideo(){

    try{

        const dados =
            JSON.parse(
                document.getElementById(
                    "jsonInput"
                ).value
            );

        VideoConcluido = false;
        segundosAssistidos = 0;

        const player =
            document.getElementById(
                "player"
            );

        document.getElementById(
            "progresso"
        ).innerText =
            "0%";

        document.getElementById(
            "btnNext"
        ).style.display =
            "none";

        document.getElementById(
            "mensagemProgresso"
        ).innerHTML =
            `Para garantir o melhor aproveitamento, assista ao menos ${PercentualAssistido}% do vídeo para liberar o próximo conteúdo.`;

        player.pause();

        player.poster =
            dados.thumbnail || "";

        document.getElementById(
            "titulo"
        ).innerText =
            dados.titulo || "";

        document.getElementById(
            "canal"
        ).innerText =
            dados.canal || "";

        document.getElementById(
            "duracao"
        ).innerText =
            formatarDuracao(
                dados.duracao
            );

        document.getElementById(
            "youtubeId"
        ).innerText =
            dados.youtube_id || "";

        document.getElementById(
            "card"
        ).style.display =
            "block";

        document.getElementById(
            "erro"
        ).innerText =
            "";

        atualizarWatermark();

        const youtubeUrl =
            dados.url_youtube ||
            `https://youtu.be/${dados.youtube_id}`;

fetch(
    "https://vd-engajakum.up.railway.app/api/stream",
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            youtubeUrl
        })
    }
)
        .then(r => r.json())
        .then(retorno => {

            if(!retorno.ok){

                document.getElementById(
                    "erro"
                ).innerText =
                    retorno.erro;

                return;

            }

            player.src =
                retorno.stream_url;

            player.load();

        })
        .catch(err => {

            document.getElementById(
                "erro"
            ).innerText =
                err.message;

        });

    }
    catch(ex){

        document.getElementById(
            "erro"
        ).innerText =
            "JSON inválido: " +
            ex.message;

    }

}

function atualizarWatermark(){

    const wm =
        document.getElementById(
            "watermark"
        );

    if(!wm) return;

    const canal =
        document.getElementById(
            "canal"
        ).innerText ||
        "Canal Original";

    wm.innerHTML = `
        © Todos os direitos reservados<br>
        ${canal}<br>
        ${new Date().toLocaleString("pt-BR")}
    `;

}

function moverWatermark(){

    const wm =
        document.getElementById(
            "watermark"
        );

    if(!wm) return;

    wm.style.top =
        (10 + Math.random() * 70) + "%";

    wm.style.left =
        (10 + Math.random() * 70) + "%";

}

function ativarModoAlerta(){

    if(
        watermarkModoAlerta
    ) return;

    watermarkModoAlerta =
        true;

    const wm =
        document.getElementById(
            "watermark"
        );

    wm.style.color =
        "rgba(255,0,0,.55)";

    wm.style.fontSize =
        "32px";

    moverWatermark();

    intervalWatermark =
        setInterval(
            moverWatermark,
            2000
        );

}

function desativarModoAlerta(){

    watermarkModoAlerta =
        false;

    clearInterval(
        intervalWatermark
    );

    const wm =
        document.getElementById(
            "watermark"
        );

    wm.style.color =
        "rgba(255,255,255,.55)";

    wm.style.fontSize =
        "24px";

    wm.style.top =
        "30%";

    wm.style.left =
        "25%";

}

const player =
    document.getElementById(
        "player"
    );

setInterval(
    () => {

        if(
            !player.paused &&
            !player.ended &&
            player.readyState >= 2
        ){

            segundosAssistidos++;

        }

    },
    1000
);

setInterval(
    atualizarWatermark,
    1000
);

player.addEventListener(
    "contextmenu",
    (e) => {
        e.preventDefault();
    }
);

player.addEventListener(
    "timeupdate",
    () => {

        if(
            !player.duration
        ) return;

        const percentual =
            Math.min(
                100,
                Math.floor(
                    (
                        segundosAssistidos /
                        player.duration
                    ) * 100
                )
            );

        document.getElementById(
            "progresso"
        ).innerText =
            percentual + "%";

        if(
            percentual >= PercentualAssistido &&
            !VideoConcluido
        ){

            VideoConcluido =
                true;

            document.getElementById(
                "btnNext"
            ).style.display =
                "inline-block";

            document.getElementById(
                "mensagemProgresso"
            ).innerHTML =
                "✅ Vídeo concluído. Próxima etapa liberada.";

        }

    }
);

player.addEventListener(
    "ended",
    () => {

        document.getElementById(
            "btnNext"
        ).style.display =
            "inline-block";

    }
);

document.addEventListener(
    "dragstart",
    (e) => {
        e.preventDefault();
    }
);

player.draggable = false;

player.addEventListener(
    "dragstart",
    (e) => {
        e.preventDefault();
    }
);

document.addEventListener(
    "copy",
    (e) => {

        if(
            e.target.id === "jsonInput"
        ){
            return;
        }

        e.preventDefault();

    }
);

document.addEventListener(
    "cut",
    (e) => {

        if(
            e.target.id === "jsonInput"
        ){
            return;
        }

        e.preventDefault();

        player.pause();

        ativarModoAlerta();

        const mensagem =
            document.getElementById(
                "mensagemProgresso"
            );

        if(mensagem){

            mensagem.innerHTML =
                "⚠️ Recorte bloqueado durante a reprodução do vídeo.";

            setTimeout(
                () => {

                    if(
                        !VideoConcluido
                    ){

                        atualizarMensagemPadrao();

                    }

                },
                5000
            );

        }

    }
);


document.addEventListener(
    "paste",
    (e) => {

        if(
            e.target.id === "jsonInput"
        ){
            return;
        }

        e.preventDefault();

    }
);

player.playbackRate = 1;

player.addEventListener(
    "ratechange",
    () => {

        if(
            player.playbackRate !== 1
        ){

            player.playbackRate = 1;

            player.pause();

            ativarModoAlerta();

        }

    }
);

document.addEventListener(
    "keydown",
    (e) => {

        const key =
            e.key.toUpperCase();

        /*
         * Exceções permitidas apenas
         * para o campo JSON
         */
        if(
            e.target.id === "jsonInput" &&
            e.ctrlKey &&
            ["A", "C", "V", "X", "Z", "Y"]
                .includes(key)
        ){
            return;
        }

        const teclasEspeciais = [
            "ESCAPE",
            "CONTEXTMENU",
            "PRINTSCREEN",
            "INSERT",
            "DELETE"
        ];

        const bloqueado =

            // F1-F12
            /^F([1-9]|1[0-2])$/.test(key)

            // Ctrl + letra
            || (
                e.ctrlKey &&
                /^[A-Z]$/.test(key)
            )

            // Ctrl + Shift + letra
            || (
                e.ctrlKey &&
                e.shiftKey &&
                /^[A-Z]$/.test(key)
            )

            // Ctrl + Alt + letra
            || (
                e.ctrlKey &&
                e.altKey &&
                /^[A-Z]$/.test(key)
            )

            // Teclas especiais
            || teclasEspeciais.includes(key);

        if(!bloqueado){
            return;
        }

        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();

        player.pause();

        ativarModoAlerta();

        const mensagem =
            document.getElementById(
                "mensagemProgresso"
            );

        if(mensagem){

            mensagem.innerHTML =
                "⚠️ Atenção! Atalho bloqueado durante a reprodução do vídeo. Clique no player para continuar assistindo.";

            setTimeout(
                () => {

                    if(
                        !VideoConcluido
                    ){

                        atualizarMensagemPadrao();

                    }

                },
                5000
            );

        }

        return false;

    },
    true
);

setInterval(
    () => {

        const devtoolsAberto =
            window.outerWidth - window.innerWidth > 160 ||
            window.outerHeight - window.innerHeight > 160;

        if(devtoolsAberto){

            player.pause();

            ativarModoAlerta();

            document.getElementById(
                "mensagemProgresso"
            ).innerHTML =
                "⚠️ Ferramentas do desenvolvedor detectadas.";

        }

    },
    1000
);

document.addEventListener(
    "keyup",
    (e) => {

        if(
            e.key === "PrintScreen"
        ){

            player.pause();

            ativarModoAlerta();

        }

    }
);

document.addEventListener(
    "contextmenu",
    (e) => {

        e.preventDefault();

        player.pause();

        ativarModoAlerta();

        const mensagem =
            document.getElementById(
                "mensagemProgresso"
            );

        if(mensagem){

            mensagem.innerHTML =
                "⚠️ Clique direito do mouse bloqueado durante a reprodução do vídeo, clique no Player para voltar a repoduzir";

            setTimeout(
                () => {

                    if(
                        !VideoConcluido
                    ){

                        atualizarMensagemPadrao();

                    }

                },
                5000
            );

        }

        return false;

    },
    true
);

document.addEventListener(
    "visibilitychange",
    () => {

        if(
            document.hidden
        ){

            player.pause();

            ativarModoAlerta();

        }
        else{

            desativarModoAlerta();

        }

    }
);

document.addEventListener(
    "fullscreenchange",
    () => {

        const wm =
            document.getElementById(
                "watermark"
            );

        if(!wm) return;

        if(
            document.fullscreenElement
        ){

            wm.style.position =
                "fixed";

            wm.style.zIndex =
                "2147483647";

        }
        else{

            wm.style.position =
                "absolute";

        }

    }
);

let trocasFoco = 0;

window.addEventListener(
    "blur",
    () => {

        trocasFoco++;

        player.pause();

        player.style.filter =
            "brightness(0.10)";

        ativarModoAlerta();

        if(
            trocasFoco >= 5
        ){

            document.getElementById(
                "mensagemProgresso"
            ).innerHTML =
                "⚠️ Muitas trocas de foco detectadas.";

        }

    }
);



window.addEventListener(
    "focus",
    () => {

        player.style.filter =
            "brightness(1)";

        desativarModoAlerta();

    }
);

function atualizarMensagemPadrao(){

    document.getElementById(
        "mensagemProgresso"
    ).innerHTML =
        `O % de aproveitamento corresponde ao tempo total assistido. Assista pelo menos ${PercentualAssistido}% do vídeo para liberar o próximo conteúdo.`;

}
</script>

</body>
</html>
