<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Thumbnail Player</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    box-sizing: border-box;
    margin-bottom: 10px;
}

button {
    padding: 12px 24px;
    margin-bottom: 20px;
    cursor: pointer;
}

.player-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 12px;
    background: #000;
    display: none;
    cursor: pointer;
}

.player-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.player-container iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

.play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90px;
    height: 64px;
    background: rgba(255,0,0,.9);
    border-radius: 12px;
}

.play-button::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 55%;
    transform: translate(-50%, -50%);
    border-left: 24px solid white;
    border-top: 14px solid transparent;
    border-bottom: 14px solid transparent;
}

.info {
    margin: 10px 0;
    color: #666;
    word-break: break-all;
}
</style>
</head>
<body>

<h1>Teste de Player YouTube com Thumbnail</h1>

<input
    id="youtubeUrl"
    placeholder="Cole a URL do YouTube"
/>

<button onclick="criarPlayer()">
    Gerar Player
</button>

<div id="videoIdInfo" class="info"></div>

<div
    id="playerContainer"
    class="player-container">
</div>

<script>

function extrairVideoId(url) {

    const regex = [
        /youtube\.com\/watch\?v=([^&]+)/,
        /youtu\.be\/([^?&]+)/,
        /youtube\.com\/embed\/([^?&]+)/
    ];

    for (const r of regex) {
        const match = url.match(r);
        if (match) {
            return match[1];
        }
    }

    return null;
}

function criarPlayer() {

    const url =
        document.getElementById('youtubeUrl').value.trim();

    const videoId =
        extrairVideoId(url);

    if (!videoId) {
        alert('URL inválida.');
        return;
    }

    document.getElementById('videoIdInfo').innerHTML =
        `<strong>ID:</strong> ${videoId}`;

    const player =
        document.getElementById('playerContainer');

    player.style.display = 'block';

    player.innerHTML = `
        https://img.youtube.com/vi/${videoId}/maxresdefault.jpg

        <div class="play-button"></div>
    `;

    player.onclick = () => {

        player.innerHTML = `
            https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1
            </iframe>
        `;
    };
}

</script>

</body>
</html>
