<style>
/* =========================================================
   🔷 VARIÁVEIS E TEMA
========================================================= */
:root{
  --watermark-display: flex;
  --bg:#ffffff;
  --text:#111;
  --muted:#666;
  --card:#f5f5f7;
  --brand:#2d6cdf;
  --warn:#ffc107;
  --danger:#dc3545;
  --radius:10px;

  --space-1:0.25rem;
  --space-2:0.5rem;
  --space-3:0.75rem;
  --space-4:1rem;
  --space-5:1.25rem;
  --space-6:1.5rem;
  --space-8:2rem;

  --font-base:16px;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0b0b0c;
    --text:#f1f1f1;
    --muted:#aaa;
    --card:#141416;
    --brand:#5a8dff;
  }
}

/* =========================================================
   RESET
========================================================= */
*{ box-sizing:border-box; }

html, body{
  min-height:100%;
}

body{
  margin:0;
  font-family: system-ui, Arial, sans-serif;
  font-size: var(--font-base);
  background: var(--bg);
  color: var(--text);
  padding: var(--space-6) var(--space-4) var(--space-8);
}

/* =========================================================
   HEADER
========================================================= */
#web-header{
  display:flex;
  gap:var(--space-4);
  align-items:center;
  justify-content:center;
  padding:var(--space-4);
  position:sticky;
  top:0;
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  z-index:5;
}

/* =========================================================
   FORM
========================================================= */
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

input, select{
  padding:0.7rem;
  border-radius:8px;
  border:1px solid #ddd;
}

/* botão principal */
button.add{
  background: var(--brand);
  color:#fff;
  border:none;
  padding:1rem;
  border-radius:8px;
  cursor:pointer;
}

/* =========================================================
   LISTA + TIMELINE
========================================================= */
.lista-atividades{
  list-style:none;
  margin:0;
  padding:0;
  border:1px solid rgba(0,0,0,0.1);
  border-radius:10px;
  position:relative;
}

.lista-atividades::before{
  content:"";
  position:absolute;
  left:18px;
  top:0;
  bottom:0;
  width:2px;
  background:rgba(0,0,0,0.08);
}

.lista-atividades li{
  display:flex;
  justify-content:space-between;
  gap:1rem;
  padding:1rem 1.2rem;
  border-bottom:1px solid rgba(0,0,0,0.08);
  position:relative;
}

.lista-atividades li:last-child{
  border-bottom:none;
}

.item::before{
  content:"";
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  width:12px;
  height:12px;
  border-radius:50%;
  background:#ccc;
}

/* =========================================================
   STATUS (SOMENTE VISUAL DE TELA)
========================================================= */
.item.ativo{
  border-left:5px solid #2d6cdf;
  background:rgba(45,108,223,0.08);
}

.item.futuro{
  border-left:5px solid #ffc107;
  background:rgba(255,193,7,0.12);
}

.item.encerrado{
  border-left:5px solid #28a745;
  background:rgba(40,167,69,0.10);
  opacity:0.7;
}

.item.warning{
  animation:piscar-warning 3s infinite;
}

.item.danger{
  animation:piscar-danger 1s infinite;
}

@keyframes piscar-warning{
  0%,100%{ background:rgba(255,193,7,0.25); }
  50%{ background:rgba(255,193,7,0.05); }
}

@keyframes piscar-danger{
  0%,100%{ background:rgba(220,53,69,0.35); }
  50%{ background:rgba(220,53,69,0.1); }
}

/* =========================================================
   PROGRESSO
========================================================= */
.progress-container{
  height:5px;
  background:rgba(0,0,0,0.08);
  margin-top:6px;
  border-radius:4px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
}

/* =========================================================
   BOTÕES
========================================================= */
.item-botoes{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

/* =========================================================
   WATERMARK
========================================================= */
.watermark{
  display:var(--watermark-display);
  position:fixed;
  inset:0;
  align-items:center;
  justify-content:center;
  font-size:60px;
  opacity:0.06;
  transform:rotate(-30deg);
  pointer-events:none;
}

/* =========================================================
   PRINT (VERSÃO LIMPA TOTAL)
========================================================= */
@media print {

  /* ❌ remove TUDO que é UI */
  #menu-adicao,
  #menu-rodape,
  #web-header,
  button,
  .item-botoes,
  .progress-container,
  .watermark{
    display:none !important;
  }

  /* 🔲 base limpa */
  html, body{
    background:#fff !important;
    color:#000 !important;
    margin:0 !important;
    padding:0 !important;
  }

  /* 📄 quebra por dia */
  .pagina-detalhe{
    page-break-before:always;
    page-break-inside:avoid;
    padding-top:120px;
  }

  /* 🖼 logo e títulos simples */
  .pagina-detalhe .logo{
    display:block !important;
    width:100px;
    position:absolute;
    top:0;
    left:0;
  }

  .pagina-detalhe h2{
    text-align:center;
    font-size:18px;
    margin:0;
    position:absolute;
    top:30px;
    left:0;
    right:0;
  }

  /* 📋 lista limpa */
  .lista-atividades{
    border:none !important;
  }

  .lista-atividades li{
    border:none !important;
    padding:4px 0 !important;
  }

  /* ❌ REMOVE COMPLETAMENTE QUALQUER STATUS VISUAL */
  .item,
  .item.ativo,
  .item.futuro,
  .item.encerrado,
  .item.warning,
  .item.danger{
    background:none !important;
    border:none !important;
    opacity:1 !important;
    animation:none !important;
  }

  .item::before{
    display:none !important;
  }

  /* limpeza final */
  *{
    box-shadow:none !important;
    background:transparent !important;
  }
}

</style>

</head>

function dois(n){ return n.toString().padStart(2,'0'); }

function getTempoRestante(data, inicio, fim) {

  if (!data || !fim) return "";

  const hoje = new Date().toISOString().split("T")[0];

  // ✅ BLOQUEIA dias diferentes de hoje
  if (data !== hoje) return "";

  const agora = new Date().getTime();
  const inicioDate = new Date(`${data}T${inicio}:00`).getTime();
  const fimDate = new Date(`${data}T${fim}:00`).getTime();

  // 🟡 FUTURO
  if (agora < inicioDate) {

    const diff = inicioDate - agora;

    const h = Math.floor(diff / (1000 * 60 * 60));
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    if (h > 0) return `⏱️ Inicia em ${h}h ${m}min ${s}seg`;
    if (m > 0) return `⏱️ Inicia em ${m}min ${s}seg`;
    return `⏱️ Inicia em ${s}seg`;
  }

  // 🔵 ATIVO
  if (agora >= inicioDate && agora <= fimDate) {

    const diff = fimDate - agora;

    const h = Math.floor(diff / (1000 * 60 * 60));
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    if (h > 0) return `🔥 ${h}h ${m}min ${s}seg restantes`;
    if (m > 0) return `🔥 ${m}min ${s}seg restantes`;
    return `🔥 ${s}seg restantes`;
  }

  // ✅ ENCERRADO
  return `✅ Encerrado`;
}

	
function getStatusAtividade(data, inicio, fim) {

  const hoje = new Date().toISOString().split("T")[0];

  const agora = new Date().getTime();
  const inicioDate = new Date(`${data}T${inicio}:00`).getTime();
  const fimDate = new Date(`${data}T${fim}:00`).getTime();

  // ✅ DIA FUTURO (outro dia)
  if (data > hoje) {
    return "futuro-data";
  }

  // ✅ DIA PASSADO
  if (data < hoje) {
    return "encerrado";
  }

  // ✅ HOJE (dinâmico)
  if (agora < inicioDate) return "futuro";
  if (agora >= inicioDate && agora <= fimDate) return "ativo";
  return "encerrado";
}

function ordenarLista(lista){

  lista.sort((a,b)=>{

    // ✅ ordena pela DATA + HORA (timestamp)
    const dateA = new Date(`${a.data}T${a.inicio}:00`).getTime();
    const dateB = new Date(`${b.data}T${b.inicio}:00`).getTime();

    return dateA - dateB;
  });

  salvarLista(lista);
  return lista;
}
function el(tag, attrs={}, children=[]) {
  const e = document.createElement(tag);

  Object.entries(attrs).forEach(([k,v])=>{
	if (k === "className") e.className = v;
	else if (k.startsWith("on") && typeof v === "function")
	  e.addEventListener(k.slice(2), v);
	else
	  e.setAttribute(k, v);
  });

  (Array.isArray(children) ? children : [children]).forEach(c=>{
	if (typeof c === "string") e.appendChild(document.createTextNode(c));
	else if (c) e.appendChild(c);
  });

  return e;
}

function getDuracao(inicio, fim) {

  if (!inicio || !fim) return "";

  const i = new Date(`1970-01-01T${inicio}:00`);
  const f = new Date(`1970-01-01T${fim}:00`);
  const diff = f - i;

  if (diff <= 0) return "";

  const h = Math.floor(diff / (1000 * 60 * 60));
  const m = Math.floor((diff / (1000 * 60)) % 60);

  if (h > 0 && m > 0) return `${h}h ${m}m`;
  if (h > 0) return `${h}h`;
  return `${m}min`;
}

function buildInfo(p){

  const duracao = getDuracao(p.inicio, p.fim);

  let s = `[${p.inicio} – ${p.fim}`;

  if (duracao) {
    s += ` (Total: ${duracao})`;
  }

  s += `]`;

  if (p.tipo) s += ` ${p.tipo}`;
  if (p.nome?.trim()) s += `: ${p.nome.trim()}`;
  if (p.servo?.trim()) s += ` (${p.servo.trim()})`;
  return s;
}

function getProgresso(data, inicio, fim){

  const hoje = new Date().toISOString().split("T")[0];

  // ✅ NÃO É HOJE → NÃO TEM PROGRESSO
  if (data !== hoje) return 0;

  const agora = new Date().getTime();
  const i = new Date(`${data}T${inicio}:00`).getTime();
  const f = new Date(`${data}T${fim}:00`).getTime();

  if (agora < i) return 0;
  if (agora > f) return 100;

  return Math.floor(((agora - i) / (f - i)) * 100);
}

      }

      const infoText = el("div", { className: "info-text" }, info);

      const timerTexto = timer || timerProxima;
		const timerEl = timerTexto
			? el("div", { className: "timer-info" }, `• ${timerTexto}`)
			: null;

      const itemInfo = el("div", { className: "item-info" }, [
        infoText,
        timerEl,
        progressEl
      ]);

      // =========================
      // AÇÕES
      // =========================
      const actions = el("div", { className: "item-botoes" }, [

      ]);

function adicionarAtividade(){
  const data  = document.getElementById("data").value;
  const dia   = diaDaSemanaPorData(data);
  const tipo  = document.getElementById("tipo").value;
  const nome  = document.getElementById("nome").value.trim();
  const servo = document.getElementById("servo").value.trim();
  const inicio = document.getElementById("inicio").value;
  const fim    = document.getElementById("fim").value;

  if(!data || !inicio || !fim){
    alert("Preencha a data e horários!");
    return;
  }

  const lista = carregarLista();
  lista.push({dia, data, tipo, nome, servo, inicio, fim});
  salvarLista(lista);
  renderizarLista();

  document.getElementById("data").value = "";
  document.getElementById("tipo").selectedIndex = 0;
  document.getElementById("nome").value="";
  document.getElementById("servo").value="";
  document.getElementById("inicio").value="";
  document.getElementById("fim").value="";
}

function editarAtividade(index){
  const lista = carregarLista();
  const p = lista[index];
  const dataBrAtual = isoParaBr(p.data);
  const entradaDataBr = prompt("Editar data (DD/MM/AAAA):", dataBrAtual);
  if (entradaDataBr === null) return;
  const novaDataIso = brParaIso(entradaDataBr);
  if (!novaDataIso) {
    alert("Data inválida. Use o formato DD/MM/AAAA (ex.: 12/03/2026).");
    return;
  }
  const novoDia  = diaDaSemanaPorData(novaDataIso);
  let novoTipo = prompt(`Escolha o tipo de atividade:\n${tiposAtividade.join(", ")}`, p.tipo || "");
  if (!novoTipo) novoTipo = "";
  if (!tiposAtividade.includes(novoTipo)) novoTipo = "";
  const novoNome  = (prompt("Editar nome da Atividade:", p.nome || "") || "").trim();
  const novoservo = (prompt("Editar nome do Servo:", p.servo || "") || "").trim();
  const novoInicio = prompt("Editar hora de início (HH:MM):", p.inicio);
  if (!novoInicio) return;
  const novoFim = prompt("Editar hora de fim (HH:MM):", p.fim);
  if (!novoFim) return;
  lista[index] = {
    dia:   novoDia,
    data:  novaDataIso,
    tipo:  novoTipo,
    nome:  novoNome,
    servo: novoservo,
    inicio: novoInicio,
    fim:    novoFim
  };
  salvarLista(lista);
  renderizarLista();
}

function excluirAtividade(index){
  if(!confirm("Deseja realmente excluir esta atividade?")) return;
  const lista = carregarLista();
  lista.splice(index,1);
  salvarLista(lista);
  renderizarLista();
}

function clonarAtividade(index){
  const lista = carregarLista();
  lista.push({...lista[index], data: lista[index].data});
  salvarLista(lista);
  renderizarLista();
}

function isoParaBr(iso) {
  if (!iso) return "";
  const [yyyy, mm, dd] = iso.split("-");
  if (!yyyy || !mm || !dd) return iso;
  return `${dd}/${mm}/${yyyy}`;
}

function brParaIso(br) {
  const m = String(br || "").trim().match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) return null;
  const dd = m[1], mm = m[2], yyyy = m[3];
  const dt = new Date(`${yyyy}-${mm}-${dd}T00:00:00`);
  if (
    isNaN(dt.getTime()) ||
    dt.getUTCFullYear() !== Number(yyyy) ||
    (dt.getUTCMonth() + 1) !== Number(mm) ||
    dt.getUTCDate() !== Number(dd)
  ) {
    return null;
  }
  return `${yyyy}-${mm}-${dd}`;
}

function gerarNomeArquivo() {
  const nome = getEvangelizacao()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_|_$/g, "");

  return `cronograma_${nome || "backup"}.json`;
}

function exportarBackup(){
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    current: {
      evangelizacao: getEvangelizacao(),
      lista: carregarLista()
    }
  };

  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = gerarNomeArquivo(); // ✅ nome melhorado

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

function handleImportFile(file){
  if(!file) return;
  const fr = new FileReader();
  fr.onload = () => {
    try{
      const obj = JSON.parse(fr.result);
      if(!obj || !Array.isArray(obj.current?.lista)) {
        alert("Arquivo JSON inválido.");
        return;
      }
      if(confirm("Deseja SUBSTITUIR a lista atual?")){
        salvarLista(obj.current.lista || []);
        setEvangelizacao(obj.current.evangelizacao || EVANG_DEFAULT);
        const inputEv = document.getElementById("evangelizacao");
        if (inputEv) inputEv.value = obj.current.evangelizacao || "";
      }
      atualizarTitulos();
      renderizarLista();
      alert("Backup importado com sucesso.");
    }catch(e){
      console.error(e);
      alert("Erro ao importar o arquivo.");
    }
  };
  fr.readAsText(file);
}

function getTempoAteProxima(data, inicio) {
  const agora = new Date().getTime();
  const inicioDate = new Date(`${data}T${inicio}:00`).getTime();

  if (agora > inicioDate) return null;

  const diff = inicioDate - agora;

  const m = Math.floor(diff / (1000 * 60));
  const s = Math.floor((diff / 1000) % 60);

  if (m > 60) {
    const h = Math.floor(m / 60);
    return `⏳ Próxima em ${h}h ${m % 60}min`;
  }

  if (m > 0) return `⏳ Próxima em ${m}min ${s}seg`;
  return `⏳ Próxima em ${s}seg`;
}
	
function zerarTudo(){
  if (!confirm("Tem certeza que deseja ZERAR a LISTA atual? Esta ação não pode ser desfeita.")) {
    return;
  }
  try {
    localStorage.removeItem(LIST_KEY);
    localStorage.removeItem(HIST_KEY);
    atualizarTitulos();
    renderizarLista();
    alert("Pronto! Lista foi zerada.");
  } catch (e) {
    console.error(e);
    alert("Não foi possível zerar. Tente novamente.");
  }
}

document.addEventListener("DOMContentLoaded", () => {

  // ===============================
  // 🔹 INICIALIZA SEU SISTEMA
  // ===============================
  const ev = getEvangelizacao();
  const input = document.getElementById("evangelizacao");
  if (input) input.value = (ev === EVANG_DEFAULT ? "" : ev);

  atualizarTitulos();
  renderizarLista();

  const btnZerar = document.getElementById('btn-zerar-tudo');
  if (btnZerar) btnZerar.addEventListener('click', zerarTudo);


  // ===============================
  // ✅ NOVO: CONTROLE DO MENU
  // ===============================
  const btn = document.getElementById("toggle-menu-adicao");
  const menu = document.getElementById("menu-adicao");

  if (btn && menu) {

    // 👉 estado inicial: fechado
    menu.classList.add("collapsed");
    btn.textContent = "+";

    // 👉 clique alterna estado
    btn.addEventListener("click", () => {
      const aberto = menu.classList.contains("expanded");

      if (aberto) {
        menu.classList.remove("expanded");
        menu.classList.add("collapsed");
        btn.textContent = "+";
      } else {
        menu.classList.remove("collapsed");
        menu.classList.add("expanded");
        btn.textContent = "-";
      }
    });
  }

let intervalRender = null;

function iniciarRender() {
  if (!intervalRender) {
    intervalRender = setInterval(renderizarLista, 1000);
  }
}

function pararRender() {
  if (intervalRender) {
    clearInterval(intervalRender);
    intervalRender = null;
  }
}

// ✅ PAUSA AO IMPRIMIR
window.addEventListener("beforeprint", () => {
  pararRender();
});

// ✅ VOLTA AO NORMAL
window.addEventListener("afterprint", () => {
  iniciarRender();
});

iniciarRender();
