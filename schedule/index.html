<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Programação Movimento Tremembé</title>
<link rel="icon" href="https://misericordia.com.br/wp-content/uploads/2019/11/16x16px.png" type="image/x-icon">

<style>

/* ===============================
   STATUS DAS ATIVIDADES
================================*/
/* ❌ ENCERRADO (hoje + anteriores) */
.item.encerrado {
  border-left: 5px solid rgba(40,167,69,0.7); /* old: border-left: 5px solid #28a745;*/
  background: rgba(40,167,69,0.06); /* ✅ mais suave  antigo: background: rgba(40,167,69,0.10);*/
  opacity: 1; /* ✅ NÃO use opacity geral antigo: opacity: 0.7;*/
}

	
/* 🟡 FUTURO (hoje e dias futuros igual, sem diferença) */
.item.futuro {
  border-left: 5px solid transparent;
  background: transparent;
  opacity: 1;
}

/* 🔵 EM ANDAMENTO */
.item.em-andamento {
  border-left: 5px solid #2d6cdf;
  background: rgba(45,108,223,0.06);
}

.item.em-andamento.ativo {
  border-left: 5px solid rgba(45,108,223,0.7);
  background: rgba(45,108,223,0.05);
}

.item.em-andamento.warning {
  border-left: 5px solid rgba(255,193,7,0.8);
  background: rgba(255,193,7,0.06);
}

.item.em-andamento.danger {
  border-left: 5px solid rgba(220,53,69,0.8);
  background: rgba(220,53,69,0.06);
}


/* 🌟 PRÓXIMA ATIVIDADE */
.item.proxima {
  border-left: 5px solid rgba(60,60,60,0.4);
  background: rgba(0,0,0,0.04);
  box-shadow: 0 0 12px rgba(255,193,7,0.35);
  transform: scale(1.01);
}
	

/* ⚠️ alertas continuam opcionais */
.item.warning {
  border-left: 5px solid #ffc107;  
}

.item.danger {
  border-left: 5px solid #dc3545;
}
	
@keyframes piscar-warning {
  0%   { background: rgba(255,193,7,0.25); }
  50%  { background: rgba(255,193,7,0.05); }
  100% { background: rgba(255,193,7,0.25); }
}

@keyframes piscar-danger {
  0%   { background: rgba(220,53,69,0.35); }
  50%  { background: rgba(220,53,69,0.1); }
  100% { background: rgba(220,53,69,0.35); }
}
	
/* ===============================
   BARRA DE PROGRESSO
================================*/

.progress-container{
  width: 100%;
  height: 6px;
  margin-top: 6px;

  background: rgba(0,0,0,.08);
  border-radius: 999px;
  overflow: hidden;

  flex-shrink: 0; /* 🔥 IMPORTANTE: evita sumir em flex */
}

/* BASE DA BARRA */
.progress-bar {
  height: 100%;
  transition: width 0.3s linear;
}

/* 🟡 FUTURO */
.progress-bar.futuro {
  background: #ffc107;
}

/* 🔵 EM ANDAMENTO */
.progress-bar.ativo{
  background: linear-gradient(
    90deg,
    #2d6cdf,
    #5a8dff
  );
}

/* 🟡 ÚLTIMOS 10 MINUTOS */
.progress-bar.warning{
  background: linear-gradient(
    90deg,
    #ffc107,
    #ffd95e
  );
}

/* 🔴 ÚLTIMOS 5 MINUTOS */
.progress-bar.danger{
  background: linear-gradient(
    90deg,
    #dc3545,
    #ff6b7a
  );
}

/* ===============================
   BOTÃO VOLTAR
================================*/
.btn-voltar {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: #f5f5f7;
  color: #111;
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s ease;
  margin-bottom: 1.5rem;
}

.btn-voltar:hover {
  background: #2d6cdf;
  color: #fff;
  border-color: #2d6cdf;
}

@media (prefers-color-scheme: dark) {
  .btn-voltar {
    background: #141416;
    color: #f1f1f1;
    border-color: rgba(255,255,255,0.15);
  }
  .btn-voltar:hover {
    background: #5a8dff;
    color: #fff;
  }
}

/* ===============================
   VARIÁVEIS E TEMA
================================*/
:root{
  /* ✅ FLAG watermark-display (Marca D'Água) */
  /* --> block = mostra "Em Desenvolvimento" ou none = esconde "Em Desenvolvimento" */
  --watermark-display: flex;	
  --bg:#ffffff;
  --text:#111;
  --muted:#666;
  --card:#f5f5f7;
  --brand:#2d6cdf;
  --warn:#ffc107;
  --danger:#dc3545;
  --radius:10px;
  --space-1:0.25rem;
  --space-2:0.5rem;
  --space-3:0.75rem;
  --space-4:1rem;
  --space-5:1.25rem;
  --space-6:1.5rem;
  --space-8:2rem;
  --font-base:16px;
}

@media (prefers-color-scheme: dark){
  :root{
	--bg:#0b0b0c;
	--text:#f1f1f1;
	--muted:#aaa;
	--card:#141416;
	--brand:#5a8dff;
  }
}

/* ===============================
   RESET E BASE
================================*/
*{ box-sizing:border-box; }
html, body { min-height: 100%; height: auto; }
body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  font-size: var(--font-base);
  line-height:1.45;
  color:var(--text);
  background:var(--bg);
  margin:0;
  padding: var(--space-6) var(--space-4) var(--space-8);
}

h1,h2,h3{
  margin:0 0 var(--space-4);
  line-height:1.2;
}
h1{ font-size:1.6rem; font-weight:700; }
h2{ font-size:1.25rem; font-weight:600; }
h3{ font-size:1.1rem; color:var(--muted); font-weight:600; }

.container{
  max-width: 1100px;
  margin: 0 auto;
}

/* ===============================
   CABEÇALHO DA WEB
================================*/
#web-header{
  display:flex;
  gap: var(--space-4);
  align-items:center;
  justify-content:center;
  padding: var(--space-4) var(--space-4);
  position: relative;
  top:0;
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
  z-index: 5;
}

#web-header img{
  width: 120px;
  height:auto;
}

#web-header h1{
  text-align:center;
  margin:0;
}

/* ===============================
   FORMULÁRIO SUPERIOR – CAMPOS BASE
================================*/
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-weight:600;
  font-size:0.92rem;
}

input, select{
  width:100%;
  padding: 0.7rem 0.8rem;
  border:1px solid color-mix(in srgb, var(--text) 18%, transparent);
  background: var(--bg);
  color: var(--text);
  border-radius:8px;
  font-size:1rem;
}

input[type="time"]{
  font-variant-numeric: tabular-nums;
}

/* Botão principal */
button.add{
  padding: 0.95rem 1.1rem;
  background: var(--brand);
  color: #fff;
  font-weight:600;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:1rem;
  width:100%;
}
@media (min-width:820px){
  button.add{ width:auto; }
}

/* Demais botões */
button.open,
button.clone,
button.delete,
button.edit{
  padding: 0.55rem 0.8rem;
  font-size:0.9rem;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button.open, button.clone{
  background: var(--brand);
  color:#fff;
}
button.delete{
  background: var(--danger);
  color:#fff;
}
button.edit{
  background: var(--warn);
  color:#000;
}

/* ===============================
   PATCH: SUPORTE às classes col-*
================================*/
/* GRID PRINCIPAL COM 12 COLUNAS */
#menu-adicao{
  display:grid;
  grid-template-columns: repeat(12, 1fr);
  gap:16px;
  padding: var(--space-6) var(--space-4);
  margin: var(--space-6) auto;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
}

/* Faz o menu de adição ficar fixo no topo ao rolar */
#menu-adicao {
  position: sticky;
  top: 0;
  z-index: 20;

  /* Fundo sólido para não mostrar conteúdo atrás */
  background: color-mix(in srgb, var(--card) 80%, transparent);
  backdrop-filter: blur(8px);

  /* Linha de separação visual */
  border-bottom: 1px solid color-mix(in srgb, var(--text) 12%, transparent);
}

/* MOBILE = campos ocupam a linha toda */
#menu-adicao .col-2,
#menu-adicao .col-3,
#menu-adicao .col-4,
#menu-adicao .col-6,
#menu-adicao .col-8,
#menu-adicao .col-12 {
  grid-column: span 12;
}

/* TELAS MÉDIAS */
@media (min-width:560px){
  #menu-adicao .col-2{ grid-column: span 6; }
  #menu-adicao .col-3{ grid-column: span 6; }
  #menu-adicao .col-4{ grid-column: span 6; }
  #menu-adicao .col-6{ grid-column: span 6; }
  #menu-adicao .col-8{ grid-column: span 12; }
  #menu-adicao .col-12{ grid-column: span 12; }
}

/* TELAS GRANDES */
@media (min-width:900px){
  #menu-adicao .col-2{ grid-column: span 2; }
  #menu-adicao .col-3{ grid-column: span 3; }
  #menu-adicao .col-4{ grid-column: span 4; }
  #menu-adicao .col-6{ grid-column: span 6; }
  #menu-adicao .col-8{ grid-column: span 8; }
  #menu-adicao .col-12{ grid-column: span 12; }
}

/* ===============================
   LISTA DE ATIVIDADES
================================*/

#scroll-spacer{
  height: 120px;
  pointer-events: none;
}

#lista{
  display:block;
  margin-top: var(--space-6);
}

.pagina-detalhe{
  margin-bottom: var(--space-8);
}

.lista-atividades{
  list-style:none;
  margin:0;
  padding:0;
  border:1px solid color-mix(in srgb, var(--text) 12%, transparent);
  border-radius:var(--radius);
  background:var(--bg);
  overflow:hidden;
}

.lista-atividades li{
  flex-direction: column;
  display:flex;
  flex-wrap:wrap; /* permite a barra ir para outra linha */

  align-items:flex-start;
  justify-content:space-between;

  gap: var(--space-3);

  padding: var(--space-4) var(--space-5);
  border-bottom:1px solid color-mix(in srgb, var(--text) 8%, transparent);
}

.lista-atividades li:last-child{
  border-bottom:none;
}

.item-info{
  text-align:left;
  flex:1 1 auto;
  font-size:1rem;
  line-height:1.35;
  word-break:break-word;
}

.item-botoes{
  display:flex;
  flex-wrap:wrap;
  gap: var(--space-3);
}

/* ===============================
   ÍCONE DE OBSERVAÇÃO (💬)
================================*/
.lista-atividades li {
  position: relative;
}

.icon-obs {
  position: absolute;

  top: 6px;
  right: 6px;

  font-size: 18px;
  cursor: pointer;

  opacity: 0.6;
  transition: all 0.2s ease;
}

.icon-obs:hover {
  opacity: 1;
  transform: scale(1.2);
}

/* quando tem comentário */
.icon-obs.tem-obs {
  opacity: 1;
}

@media(max-width:520px){

  .item-info{
    order:1;
  }

  .progress-container{
    order:999;
    width:100%;
  }

  .item-botoes{
    order:3;
  }

}

@media (min-width:521px){

  .lista-atividades li{
    position: relative;
  }

  .item-botoes{
    opacity: 0;
    visibility: hidden;
    transform: translateX(10px);
    transition: all .2s ease;
  }

  .lista-atividades li:hover .item-botoes{
    opacity: 1;
    visibility: visible;
    transform: translateX(0);
  }
}

/* ===============================
   PRINT (IMPRIMIR)
================================*/
.print-only{ display:none; }
.logo { display: none; }

@media print {
/* ✅ REMOVE DESTAQUE NA IMPRESSÃO */
.item.destaque {
  border-left: none !important;
  background: transparent !important;
}
	
.item {
  border-left: none !important;
}

  .print-only {
    display: block !important;
  }

  /* ===============================
     REMOVE ELEMENTOS DA INTERFACE
  ============================== */
  #menu-adicao,
  #web-header,
  #menu-rodape,
  .item-botoes,
  button,
  .add,
  .open,
  .edit,
  .delete,
  .clone,
  .btn-voltar,
  .progress-container,
  .watermark {
    display: none !important;
  }

  /* ===============================
     BASE DA IMPRESSÃO
  ============================== */
  html,
  body {
    background: #fff !important;
    color: #000 !important;
    margin: 0 !important;
    padding: 0 !important;
    font-size: 14px !important;
  }

  /* ===============================
     PÁGINAS
  ============================== */
  .pagina-detalhe {
    display: block !important;
    page-break-before: always;
    page-break-inside: avoid;
    position: relative;
    padding-top: 120px !important;
  }

  /* ===============================
     LOGO
  ============================== */
  .pagina-detalhe .logo {
    display: block !important;
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100px !important;
    height: auto !important;
  }

  /* ===============================
     TÍTULO
  ============================== */
  .pagina-detalhe h2 {
    position: absolute !important;
    top: 30px !important;
    left: 0 !important;
    right: 0 !important;
    text-align: center !important;
    font-size: 18px !important;
    font-weight: 700 !important;
    margin: 0 !important;
  }

  /* ===============================
     DATA / DIA DA SEMANA
  ============================== */
  .pagina-detalhe h3 {
    margin-top: 20px !important;
    margin-bottom: 10px !important;
    font-size: 15px !important;
  }

  /* ===============================
     LISTA
  ============================== */
  .lista-atividades {
    border: none !important;
    background: #fff !important;
  }

  .lista-atividades li {
    display: block !important;
    border: none !important;
    padding: 4px 0 !important;
    margin-bottom: 4px !important;
  }

  .item-info {
    display: block !important;
    white-space: normal !important;
  }

  /* ===============================
     LIMPEZA VISUAL
  ============================== */
  * {
    background: transparent !important;
    box-shadow: none !important;
    animation: none !important;
  }

}
/* ===============================
   MENU DE RODAPÉ – SOMENTE WEB (ALINHADO EM UMA LINHA)
================================*/
#menu-rodape{
  position: fixed;
  inset: auto 0 0 0;
  background: color-mix(in srgb, var(--card) 80%, transparent);
  border-top: 1px solid color-mix(in srgb, var(--text) 15%, transparent);
  padding: 4px 8px calc(4px + env(safe-area-inset-bottom));
  box-shadow: 0 -2px 6px rgba(0,0,0,0.08);
  z-index: 1000;

  -webkit-overflow-scrolling: touch;
  contain: layout paint;
}

.menu-rodape-content{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  max-width: 1100px;
  margin: 0 auto;
  min-width: 0;
}

.field-inline{
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  flex: 0 1 auto;
}

#menu-rodape label{
  font-size: 0.9rem;
  font-weight: 600;
  white-space: nowrap;
}

#menu-rodape input{
  padding: 6px 10px;
  font-size: 0.9rem;
  border-radius: 8px;
  border: 1px solid color-mix(in srgb, var(--text) 18%, transparent);
  background: var(--bg);
  color: var(--text);
  min-width: 140px;
  max-width: 220px;
  width: 100%;
}

.rodape-actions{
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1 1 auto;
  justify-content: flex-end;
  min-width: 0;
  flex-wrap: nowrap;
}

.btn_rodape,
.sec-btn{
  padding: 8px 12px;
  font-size: 0.9rem;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid color-mix(in srgb, var(--text) 18%, transparent);
  background: color-mix(in srgb, var(--card) 92%, transparent);
  color: var(--text);
}

.sec-btn{
  background: var(--danger);
  color:#fff;
}

.btn_rodape{
  background: var(--brand);
  color:#fff;
}

@media (max-width: 720px){
  .menu-rodape-content{
	flex-wrap: wrap;
	gap: 8px;
  }
  .field-inline{
	flex: 1 1 100%;
  }
  .rodape-actions{
	flex: 1 1 100%;
	justify-content: flex-start;
	flex-wrap: wrap;
	gap: 6px;
  }
  #menu-rodape input{
	max-width: 100%;
  }
}

button.obs {
  background: transparent;
  border: none;     /* ✅ remove borda preta feia */
  cursor: pointer;
  font-size: 20px;
  opacity: 0.6;
  transition: all 0.2s ease;
}

button.obs:hover {
  opacity: 1;
  transform: scale(1.3);
}

/* quando tem comentário */
button.obs.tem-obs {
  color: #2d6cdf;
  opacity: 1;
}

body{
  padding-bottom: 200px !important;
}
	/* Inicio novo css */
/* =========================================================
   🔽 NOVO: CONTROLE DE EXPANDIR / RECOLHER MENU
   (não altera layout original, só adiciona comportamento)
========================================================= */

/* 🔹 Garante que o botão possa ficar posicionado dentro do menu */
#menu-adicao {
  position: relative; /* NÃO remove o sticky, isso só permite o botão ficar no canto */
}

/* 🔹 Posiciona o botão + / - no canto superior direito */
#toggle-menu-adicao {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 30;
}

/* 🔹 Quando o menu estiver FECHADO */
#menu-adicao.collapsed {
  height: 22px !important;      /* altura mínima visível */
  max-height: 48px !important;  /* evita crescimento */
  overflow: hidden !important;  /* esconde conteúdo */
  padding-top: 12px !important; /* espaço para o botão */
}

/* 🔹 Esconde TODOS os elementos internos quando colapsado */
#menu-adicao.collapsed > *:not(#toggle-menu-adicao) {
  opacity: 0 !important;
  visibility: hidden !important;
  height: 0 !important;
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
  pointer-events: none !important; /* impede clique */
}

/* 🔹 Mantém o botão sempre visível */
#menu-adicao.collapsed #toggle-menu-adicao {
  opacity: 1 !important;
  visibility: visible !important;
  pointer-events: auto !important;
}
	
	/* fim novo css */

.watermark {
  display: var(--watermark-display);
  position: fixed;
  inset: 0;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  user-select: none;
  z-index: 999999;
  font-size: 60px;
  font-weight: bold;
  color: rgba(0,0,0,0.06);
  transform: rotate(-30deg);
}
@media print { .watermark { display:none!important; } }

.item.destaque {
 background: rgba(255,193,7,0.08);  border-left: 5px solid #ffc107;
  position: relative; /* ✅ garante posicionamento */
}


@media print {

  /* ✅ garante logo visível (override direto) */
  .logo {
    display: block !important;
  }

  /* ✅ remove ícone que interfere no layout */
  .icon-obs {
    display: none !important;
  }

}


@media print {

  /* ✅ garante que a logo aparece SEMPRE */
  .logo {
    display: block !important;
  }

  .pagina-detalhe .logo {
    display: block !important;
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100px !important;
    height: auto !important;
    z-index: 1 !important;
  }

  /* ✅ limpa elementos absolutos que atrapalham layout */
  .icon-obs {
    display: none !important;
  }

  /* ✅ remove qualquer posicionamento relativo que possa quebrar impressão */
  .item {
    position: static !important;
  }

  /* ✅ garante título central correto */
  .pagina-detalhe h2 {
    position: absolute !important;
    top: 30px !important;
    left: 0 !important;
    right: 0 !important;
    text-align: center !important;
  }

}	

@media (max-width:520px){

  /* ✅ esconde rodapé */
  #menu-rodape{
    display: none !important;
  }

  /* ✅ esconde menu superior */
  #menu-adicao{
    display: none !important;
  }

  /* ✅ esconde botão +/- */
  #toggle-menu-adicao{
    display: none !important;
  }

}

body{
  padding-bottom: 200px !important;
}

	
</style>

</head>
<body>
<div class="container">

	<div id="web-header" role="banner" aria-label="Topo">
  	<a href="../" class="logo-link">
    	<img src="https://misericordia.com.br/wp-content/uploads/2023/08/alianca_logo-header.png"
         	alt="Logo da Aliança">
  	</a>
  
  	<h1 id="titulo-web">Programação Movimento Tremembé</h1>
	</div>
	

  <div id="menu-adicao" aria-labelledby="titulo-form">
	<button id="toggle-menu-adicao" class="toggle-form-btn">-</button>
	<h2 id="titulo-form" class="sr-only" style="position:absolute;left:-9999px;">
	  Adicionar atividade
	</h2>

	<div class="field col-2">
	  <label for="data">Data</label>
	  <input type="date" id="data" title="Selecione a data da atividade">
	</div>
	
	<div class="field col-4">
	  <label for="tipo">Tipo</label>

function diaDaSemanaPorData(dataString) {
  const diasSemana = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
  const dataObj = new Date(dataString + "T00:00:00"); 
  return diasSemana[dataObj.getDay()];

function dois(n){ return n.toString().padStart(2,'0'); }

function getTempoRestante(data, inicio, fim) {

  if (!data || !inicio || !fim) return "";

  const hoje = new Date().toISOString().split("T")[0];

  // ❌ só calcula se for hoje
  if (data !== hoje) return "";

  const agora = Date.now();

  const inicioDate = parseDateTime(data, inicio);
  const fimDate = parseDateTime(data, fim);

  // 🔴 segurança: dados inválidos
  if (!inicioDate || !fimDate) return "";

  // 🟡 FUTURO (ainda não começou)
  if (agora < inicioDate) {

    const diff = inicioDate - agora;

    const h = Math.floor(diff / (1000 * 60 * 60));
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    if (h > 0) return `⏳ Inicia em ${h}h ${m}min ${s}seg`;
    if (m > 0) return `⏳ Inicia em ${m}min ${s}seg`;
    return `⏳ Inicia em ${s}seg`;
  }

  // 🔵 EM ANDAMENTO
  if (agora >= inicioDate && agora <= fimDate) {

    const diff = fimDate - agora;

    const h = Math.floor(diff / (1000 * 60 * 60));
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    if (h > 0) return `🔥 ${h}h ${m}min ${s}seg restantes`;
    if (m > 0) return `🔥 ${m}min ${s}seg restantes`;
    return `🔥 ${s}seg restantes`;
  }

  // ✅ ENCERRADO
  return `✅ Encerrado`;
}

function isDataValida(data, hora) {
  return !isNaN(new Date(`${data}T${hora}:00`).getTime());
}

function parseDateTime(data, hora) {
  if (!data || !hora) return null;
  return new Date(`${data}T${hora}:00`);
}
	function getStatusAtividade(data, inicio, fim) {

  const inicioDate = parseDateTime(data, inicio);
  const fimDate = parseDateTime(data, fim);

  if (!inicioDate || !fimDate) {
    return "futuro"; // ✅ fallback seguro
  }

  const agora = Date.now();

  if (agora >= inicioDate && agora <= fimDate) {
    return "em-andamento";
  }

  if (agora > fimDate) {
    return "encerrado";
  }

  return "futuro"; // ✅ sempre retorna algo
}

function marcarProximaAtividade(lista) {

  const agora = Date.now();

  let proximaIndex = -1;
  let menorDiff = Infinity;

  lista.forEach((p, i) => {

    const inicio = parseDateTime(p.data, p.inicio);

    // 🔴 ignora dados inválidos
    if (!inicio) return;

    if (inicio > agora && (inicio - agora) < menorDiff) {
      menorDiff = inicio - agora;
      proximaIndex = i;
    }
  });

  return proximaIndex;
}
	
function dataHoje(){
  const d = new Date();
  return `${d.getFullYear()}-${dois(d.getMonth()+1)}-${dois(d.getDate())}`;

function carregarLista(){
  try {

    const lista = localStorage.getItem(LIST_KEY);
    const dados = lista ? JSON.parse(lista) : [];

    dados.forEach(item => {

      if (item.obs === undefined) item.obs = "";

      // ✅ garante ID único
      if (!item.id) {
        item.id = `id_${Date.now()}_${Math.random()}`;
      }

    });

    return dados;

  } catch(e){
    return [];
  }
}

function ordenarLista(lista) {

  lista.sort((a, b) => {

    const dateA = new Date(`${a.data}T${a.inicio}:00`);
    const dateB = new Date(`${b.data}T${b.inicio}:00`);

    return dateA - dateB;
  });

  return lista;
}
	
function el(tag, attrs={}, children=[]) {
  const e = document.createElement(tag);

  Object.entries(attrs).forEach(([k,v])=>{
	if (k === "className") e.className = v;
	else if (k.startsWith("on") && typeof v === "function")
	  e.addEventListener(k.slice(2), v);
	else
	  e.setAttribute(k, v);
  });

  (Array.isArray(children) ? children : [children]).forEach(c=>{
	if (typeof c === "string") e.appendChild(document.createTextNode(c));
	else if (c) e.appendChild(c);
  });

  return e;
}

function getDuracao(inicio, fim) {

  if (!inicio || !fim) return "";

  const i = new Date(`1970-01-01T${inicio}:00`);
  const f = new Date(`1970-01-01T${fim}:00`);
  const diff = f - i;

  if (diff <= 0) return "";

  const h = Math.floor(diff / (1000 * 60 * 60));
  const m = Math.floor((diff / (1000 * 60)) % 60);

  if (h > 0 && m > 0) return `${h}h ${m}m`;
  if (h > 0) return `${h}h`;
  return `${m}mim`;
}

function buildInfo(p) {

  const duracao = getDuracao(p.inicio, p.fim);

  let texto = `[${p.inicio} – ${p.fim}`;

  if (duracao) {
    texto += ` (Total: ${duracao})`;
  }

  texto += `]`;

  if (p.tipo) {
    texto += ` ${p.tipo}`;
  }

  if (p.nome?.trim()) {
    texto += `: ${p.nome.trim()}`;
  }

  if (p.servo?.trim()) {
    texto += ` (${p.servo.trim()})`;
  }

  /* ===============================
     TIMER (NÃO APARECE NO PRINT)
  ============================== */
  if (!isPrinting) {

    const timer = getTempoRestante(
      p.data,
      p.inicio,
      p.fim
    );

    if (timer) {
      texto += ` • ${timer}`;
    }
  }

  return texto;
}

  const agora = Date.now();

  const i = parseDateTime(data, inicio);
  const f = parseDateTime(data, fim);

  // 🔴 segurança: dados inválidos
  if (!i || !f) return 0;

  if (agora < i) return 0;
  if (agora > f) return 100;

  return Math.floor(((agora - i) / (f - i)) * 100);
}

function renderizarLista() {

  const listaDiv = document.getElementById("lista");
  listaDiv.innerHTML = "";

  const lista = ordenarLista(carregarLista());
  const proximaIndex = marcarProximaAtividade(lista);

  const grupos = {};

  lista.forEach(p => {
    if (!grupos[p.data]) grupos[p.data] = [];
    grupos[p.data].push(p);
  });

  const datasOrdenadas = Object.keys(grupos).sort();

  datasOrdenadas.forEach(data => {

    const atividadesDoDia = grupos[data];

    const containerDia = el("section", {
      className: "pagina-detalhe"
    });

    const dataBr = data.split("-").reverse().join("/");
    const diaSemana = diaDaSemanaPorData(data);

    const h2Titulo = el("h2", { className: "print-only" }, getTituloProgramacao());
    const hDia = el("h3", {}, `${diaSemana} - ${dataBr}`);

    containerDia.appendChild(h2Titulo);
    containerDia.appendChild(hDia);

    const ul = el("ul", { className: "lista-atividades" });

    atividadesDoDia.forEach(p => {

      const idxReal = lista.findIndex(item => item.id === p.id);
      const status = getStatusAtividade(p.data, p.inicio, p.fim);
      const isProxima = (idxReal === proximaIndex);

      const li = el("li", {
        className: `
          item 
          ${status} 
          ${isProxima ? "proxima" : ""}
          ${p.destaque ? "destaque" : ""}
        `
      });

      // 💬 OBS
      if ((p.obs || "").trim()) {
        const iconObs = el("span", { className: "icon-obs" }, "💬");
        iconObs.setAttribute("title", p.obs);
        iconObs.addEventListener("click", () => editarObservacao(p.id));
        li.appendChild(iconObs);
      }

      // ✅ TEXTO BASE
      let texto = buildInfo(p);

      const timer = getTempoRestante(p.data, p.inicio, p.fim);

      if (!isPrinting && timer) {

        if (timer.startsWith("🔥")) {
          texto += ` • ${timer}`;
        }
        else if (timer.startsWith("✅")) {
          texto += ` • ${timer}`;
        }
        else if (isProxima && timer.startsWith("⏳")) {
          texto += ` • ${timer}`;
        }
      }

      const divInfo = el("div", {
        className: "item-info"
      }, texto);

      li.appendChild(divInfo);

      // ✅ ===== PROGRESSO + COR DINÂMICA =====
      if (status === "em-andamento") {

        const progresso = getProgresso(p.data, p.inicio, p.fim);

        let classeBarra = "progress-bar ativo";
        let classeItemExtra = "ativo";

        const fimDate = parseDateTime(p.data, p.fim);
        const agora = Date.now();
        const minutosRestantes = (fimDate - agora) / (1000 * 60);

        if (minutosRestantes <= 5) {
          classeBarra = "progress-bar danger";
          classeItemExtra = "danger";
        }
        else if (minutosRestantes <= 10) {
          classeBarra = "progress-bar warning";
          classeItemExtra = "warning";
        }

        const barraContainer = el("div", {
          className: "progress-container"
        });

        const barra = el("div", {
          className: classeBarra,
          style: `width: ${progresso}%`
        });

        barraContainer.appendChild(barra);
        li.appendChild(barraContainer);

        // ✅ sincroniza borda lateral
        li.classList.add(classeItemExtra);
      }

      // ✅ BOTÕES (PADRÃO CORRETO COM ID)
      const bEdit = el("button", { className: "edit" }, "Editar");
      bEdit.addEventListener("click", () => editarAtividade(p.id));

      const bDelete = el("button", { className: "delete" }, "Excluir");
      bDelete.addEventListener("click", () => excluirAtividade(p.id));

      const bClone = el("button", { className: "clone" }, "Clonar");
      bClone.addEventListener("click", () => clonarAtividade(p.id));

      const divBtns = el("div", {
        className: "item-botoes"
      }, [bEdit, bDelete, bClone]);

      li.appendChild(divBtns);

      ul.appendChild(li);

    });

    containerDia.appendChild(ul);
    listaDiv.appendChild(containerDia);

  });

}	


function adicionarAtividade(){

  const data  = document.getElementById("data").value;
  const dia   = diaDaSemanaPorData(data);
  const tipo  = document.getElementById("tipo").value;
  const nome  = document.getElementById("nome").value.trim();
  const servo = document.getElementById("servo").value.trim();
  const inicio = document.getElementById("inicio").value;
  const fim    = document.getElementById("fim").value;

  if(!data || !inicio || !fim){
    alert("Preencha a data e horários!");
    return;
  }

  const lista = carregarLista();

  lista.push({
    id: `id_${Date.now()}_${Math.random()}`, // ✅ ID único
    dia,
    data,
    tipo,
    nome,
    servo,
    inicio,
    fim,
    destaque: false,
    obs: ""
  });

  salvarLista(lista);
  renderizarLista();
}

function editarObservacao(index){

  const lista = carregarLista();

  const atual = lista[index].obs || "";

  const nova = prompt("Observação:", atual);

  if (nova === null) return;

  const texto = nova.trim();

  lista[index].obs = texto;

  lista[index].destaque = texto.length > 0;

  salvarLista(lista);
  renderizarLista();
}
	
function toggleDestaque(index){
  const lista = carregarLista();

  lista[index].destaque = !lista[index].destaque;

  salvarLista(lista);
  renderizarLista();
}
	
let intervalTimers = null;
let intervalProgresso = null;
let intervalGlobal = null;

function buildInfo(p) {

  const duracao = getDuracao(p.inicio, p.fim);

  let texto = `[${p.inicio} – ${p.fim}`;

  if (duracao) {
    texto += ` (Total: ${duracao})`;
  }

  texto += `]`;

  if (p.tipo) {
    texto += ` ${p.tipo}`;
  }

  if (p.nome?.trim()) {
    texto += `: ${p.nome.trim()}`;
  }

  if (p.servo?.trim()) {
    texto += ` (${p.servo.trim()})`;
  }

  return texto;
}
	
function pararLoops() {

  if (!intervalGlobal) {
    return;
  }

  clearInterval(intervalGlobal);
  intervalGlobal = null;

}

function editarAtividade(id){

  const lista = carregarLista();

  const index = lista.findIndex(item => item.id === id);
  if (index === -1) {
    alert("Erro: atividade não encontrada");
    return;
  }

  const p = lista[index];

  const dataBrAtual = isoParaBr(p.data);

  const entradaDataBr = prompt("Editar data (DD/MM/AAAA):", dataBrAtual);
  if (entradaDataBr === null) return;

  const novaDataIso = brParaIso(entradaDataBr);
  if (!novaDataIso) {
    alert("Data inválida.");
    return;
  }

  const novoTipo = prompt("Tipo da atividade:", p.tipo || "");
  if (novoTipo === null) return;

  const novoNome = prompt("Nome da Atividade:", p.nome || "");
  if (novoNome === null) return;

  const novoServo = prompt("Servo:", p.servo || "");
  if (novoServo === null) return;

  const novoInicio = prompt("Hora início:", p.inicio);
  if (novoInicio === null) return;

  const novoFim = prompt("Hora fim:", p.fim);
  if (novoFim === null) return;

  const novaObs = prompt("Observação:", p.obs || "");
  if (novaObs === null) return;

  const textoObs = novaObs.trim();

  lista[index] = {
    ...p,
    dia: diaDaSemanaPorData(novaDataIso),
    data: novaDataIso,
    tipo: novoTipo,
    nome: novoNome.trim(),
    servo: novoServo.trim(),
    inicio: novoInicio,
    fim: novoFim,
    obs: textoObs,
    destaque: textoObs.length > 0
  };

  salvarLista(lista);
  renderizarLista();
}


function excluirAtividade(id){

  if(!confirm("Deseja realmente excluir esta atividade?")) return;

  const lista = carregarLista();

  const novaLista = lista.filter(item => item.id !== id);

  salvarLista(novaLista);
  renderizarLista();
}

function clonarAtividade(id){

  const lista = carregarLista();

  const index = lista.findIndex(item => item.id === id);
  if (index === -1) {
    alert("Erro ao clonar");
    return;
  }

  const original = lista[index];

  const novoItem = {
    ...original,
    id: `id_${Date.now()}_${Math.random()}` // ✅ novo ID
  };

  lista.push(novoItem);

  salvarLista(lista);
  renderizarLista();
}

function isoParaBr(iso) {
  if (!iso) return "";
  const [yyyy, mm, dd] = iso.split("-");
  if (!yyyy || !mm || !dd) return iso;
  return `${dd}/${mm}/${yyyy}`;
}

function brParaIso(br) {
  const m = String(br || "").trim().match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) return null;
  const dd = m[1], mm = m[2], yyyy = m[3];
  const dt = new Date(`${yyyy}-${mm}-${dd}T00:00:00`);
  if (
    isNaN(dt.getTime()) ||
    dt.getUTCFullYear() !== Number(yyyy) ||
    (dt.getUTCMonth() + 1) !== Number(mm) ||
    dt.getUTCDate() !== Number(dd)
  ) {
    return null;
  }
  return `${yyyy}-${mm}-${dd}`;
}

function gerarNomeArquivo() {
  const nome = getEvangelizacao()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_|_$/g, "");

  return `Programacao_${nome || "backup"}.json`;
}

function exportarBackup(){
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    current: {
      evangelizacao: getEvangelizacao(),
      lista: carregarLista()
    }
  };

  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = gerarNomeArquivo(); // ✅ nome melhorado

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

function handleImportFile(file){
  if(!file) return;
  const fr = new FileReader();
  fr.onload = () => {
    try{
      const obj = JSON.parse(fr.result);
      if(!obj || !Array.isArray(obj.current?.lista)) {
        alert("Arquivo JSON inválido.");
        return;
      }
      if(confirm("Deseja SUBSTITUIR a lista atual?")){
        salvarLista(obj.current.lista || []);
        setEvangelizacao(obj.current.evangelizacao || EVANG_DEFAULT);
        const inputEv = document.getElementById("evangelizacao");
        if (inputEv) inputEv.value = obj.current.evangelizacao || "";
      }
      atualizarTitulos();
      renderizarLista();
      alert("Backup importado com sucesso.");
    }catch(e){
      console.error(e);
      alert("Erro ao importar o arquivo.");
    }
  };
  fr.readAsText(file);
}

function zerarTudo(){
  if (!confirm("Tem certeza que deseja EXCLUIR essa PROGRAMAÇÃO? Esta ação não poderá ser revertida!")) {
    return;
  }
  try {
    localStorage.removeItem(LIST_KEY);
    localStorage.removeItem(HIST_KEY);
    atualizarTitulos();
    renderizarLista();
    alert("Pronto! Lista foi zerada.");
  } catch (e) {
    console.error(e);
    alert("Não foi possível excluir essa programação. Tente novamente.");
  }
}

function iniciarLoops() {

  if (intervalGlobal) return;

  intervalGlobal = setInterval(() => {
    renderizarLista();
  }, 1000);

}
	
function setPrintMode(state) {
  isPrinting = state;
  document.body.classList.toggle("printing", state);
}

function importarJSONDireto(json) {
  try {

    if (!json.current?.lista) {
      throw new Error("Formato inválido");
    }

    // ✅ atualiza dados
    salvarLista(json.current.lista);

    // ✅ atualiza evangelização
    if (json.current.evangelizacao) {
      setEvangelizacao(json.current.evangelizacao);
    }

    atualizarTitulos();
    renderizarLista();

    alert("✅ Programação atualizada com sucesso!");

  } catch (e) {
    console.error(e);
    alert("Erro ao importar JSON do servidor!");
  }
}
	
function escolherAtualizacaoJSON() {
  fetch('import/option.json?v=' + Date.now())
    .then(res => res.json())
    .then(opcoes => {

      const escolha = prompt(
        "Escolha o arquivo:\n\n" +
        opcoes.map((op, i) => `${i + 1} - ${op.nome}`).join("\n")
      );

      const idx = parseInt(escolha) - 1;
      if (!opcoes[idx]) return;

      const caminho = "import/" + opcoes[idx].arquivo;

      fetch(caminho)
        .then(r => r.json())
        .then(importarJSONDireto)
        .catch(() => alert("Erro ao carregar arquivo"));

    })
    .catch(() => alert("Erro ao carregar opções"));
}

window.escolherAtualizacaoJSON = escolherAtualizacaoJSON;

function baixarPDF() {
  setTimeout(() => {
    window.print();
  }, 100);
}
window.baixarPDF = baixarPDF;
	
document.addEventListener("DOMContentLoaded", () => {

  // ===============================
  // 🔹 INICIALIZA
  // ===============================
  const ev = getEvangelizacao();
  const input = document.getElementById("evangelizacao");
  if (input) input.value = (ev === EVANG_DEFAULT ? "" : ev);

  atualizarTitulos();
  renderizarLista();

  setTimeout(() => {
    scrollParaAtividade();
  }, 200);

  const btnZerar = document.getElementById('btn-zerar-tudo');
  if (btnZerar) btnZerar.addEventListener('click', zerarTudo);

  // ===============================
  // 🔹 MENU TOGGLE
  // ===============================
  const btn = document.getElementById("toggle-menu-adicao");
  const menu = document.getElementById("menu-adicao");

  if (btn && menu) {
    menu.classList.add("collapsed");
    btn.textContent = "+";

    btn.addEventListener("click", () => {
      const aberto = menu.classList.contains("expanded");

      if (aberto) {
        menu.classList.remove("expanded");
        menu.classList.add("collapsed");
        btn.textContent = "+";
      } else {
        menu.classList.remove("collapsed");
        menu.classList.add("expanded");
        btn.textContent = "-";
      }
    });
  }

  // ===============================
  // 🔥 LOOPS (CORRIGIDO)
  // ===============================
  iniciarLoops();

  // ===============================
  // 🖨 PRINT CONTROL
  // ===============================

window.addEventListener("beforeprint", () => {

  isPrinting = true;

  pararLoops();

  renderizarLista();

});

window.addEventListener("afterprint", () => {

  isPrinting = false;

  renderizarLista();

  iniciarLoops();

});

});
