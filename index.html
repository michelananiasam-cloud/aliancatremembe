<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Movimento Tremembé</title>

    <!-- Favicon -->
    <link rel="icon" href="https://misericordia.com.br/wp-content/uploads/2019/11/16x16px.png">

    <!-- CSS -->
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <img 
                src="https://misericordia.com.br/wp-content/uploads/2023/08/alianca_logo-header.png"

            >

            <h1>Movimento Tremembé</h1>
        </div>

        <!-- GRID -->
        <div class="grid">

            <!-- CRONOGRAMA -->
            <a href="./chronos/" class="card chronos">
                <div class="card-icon">⏱️</div>
                <div class="card-title">Cronograma</div>
                <div class="card-description">
                    Gerencie o Cronograma de Evangelizações, Formações ou Eventos
                </div>
                <span class="card-button">Acessar →</span>
            </a>

            <!-- ORGANOGRAMA -->
            <a href="./organo/" class="card organo">
                <div class="card-icon">📊</div>
                <div class="card-title">Organograma</div>
                <div class="card-description">
                    Visualize e organize as equipes
                </div>
                <span class="card-button">Acessar →</span>
            </a>

        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p>
                <strong>Aliança de Misericórdia</strong> | Movimento Tremembé<br>
                <small>© 2026 • Desenvolvido com ❤️ por Michel Ananias</small>

    </div>

    <!-- JS (opcional) -->
    <script src="./script.js"></script>
