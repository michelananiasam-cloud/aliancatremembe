<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santo do Dia</title>

    
<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.card{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.busca{
    max-width:900px;
    margin:0 auto 20px;
    display:flex;
    gap:10px;
    align-items:center;
}

h2{
    margin-top:0;
    color:#333;
}

h3{
    margin-top:5px;
    color:#555;
}

.data{
    color:#666;
    margin-bottom:15px;
}

.texto{
    white-space:pre-wrap;
    line-height:1.7;
    color:#444;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#0b5ed7;
    color:#fff;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

input[type=date]{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.erro{
    color:#c00;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="busca">
    <input type="date" id="dataPesquisa">
    <button id="buscar">Buscar</button>
</div>

<div id="santoDoDia" class="card">
    Carregando Santo do Dia...
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(() => {

    const container = document.getElementById("santoDoDia");

    const SUPABASE_URL = "https://fmyxypykokxfeojmdsuu.supabase.co";

    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZteXh5cHlrb2t4ZmVvam1kc3V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4OTgyMjEsImV4cCI6MjA5NjQ3NDIyMX0.zPk_8i1-OmAie9HPdhLZc18cTa1dyy_kuWJibsiwmAQ";

    function obterDataConsulta(){

        const params = new URLSearchParams(window.location.search);

        const data = params.get("data");

        if(data){
            return data;
        }

        return new Date().toLocaleDateString("en-CA");

    }

    const dataConsulta = obterDataConsulta();

    document.getElementById("dataPesquisa").value = dataConsulta;

    document.getElementById("buscar").addEventListener("click",()=>{

        const data = document.getElementById("dataPesquisa").value;

        window.location.search = "?data=" + data;

    });

    async function carregarSanto(){

        try{

            if(!window.supabase){
                throw new Error("Biblioteca do Supabase não carregada.");
            }

            const supabaseClient = window.supabase.createClient(
                SUPABASE_URL,
                SUPABASE_KEY
            );

            console.log("Buscando:",dataConsulta);

const {data,error} = await supabaseClient
    .from("santos_do_dia")
    .select("titulo,texto,data,outros_santos")
    .eq("data",dataConsulta)
    .maybeSingle();

            if(error){
                throw error;
            }

            const dataFormatada = new Date(dataConsulta+"T00:00:00")
                .toLocaleDateString("pt-BR");

            if(!data){

                container.innerHTML=`
                    <h2>🙏 Santo do Dia - ${dataFormatada}</h2>

                    <p>Nenhum santo encontrado para esta data.</p>
                `;

                return;

            }

            const titulo = data.titulo ?? "Sem título";

            const texto = data.texto ?? "";

            const resumo =
                texto.length>1000
                ? texto.substring(0,1000)+"..."
                : texto;

let outrosSantos = [];

if (Array.isArray(data.outros_santos)) {

    outrosSantos = data.outros_santos.filter(item =>
        item &&
        item.trim() !== ""
    );

}

            container.innerHTML=`

                <h2>🙏 Santo do Dia - ${dataFormatada}</h2>

                <h3>${titulo}</h3>

                <div class="data">
                    <strong>Data:</strong> ${dataFormatada}
                </div>

                <div id="textoSanto" class="texto"></div>

                ${
                    texto.length>1000
                    ?'<button id="btnExpandir">Ler mais</button>'
                    :''
                }

            `;

            document.getElementById("textoSanto").textContent = resumo;
            
if (outrosSantos.length > 0) {

    const lista = document.getElementById("listaOutrosSantos");

    outrosSantos.forEach(santo => {

        const li = document.createElement("li");

        li.textContent = santo;

        li.style.marginBottom = "8px";

        lista.appendChild(li);

    });

}
            const btn=document.getElementById("btnExpandir");

            if(btn){

                btn.addEventListener("click",()=>{

                    document.getElementById("textoSanto").textContent=texto;

                    btn.remove();

                });

            }

        }
        catch(erro){

            console.error(erro);

            container.innerHTML=`

                <div class="erro">

                    <h2>Erro ao consultar o Supabase</h2>

                    <strong>${erro.message}</strong>

                    <pre>${JSON.stringify(erro,null,2)}</pre>

                </div>

            `;

        }

    }

    carregarSanto();

})();
</script>

</body>
</html>
