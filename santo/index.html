    .from("santos_do_dia")
    .select("*")
    .eq("data", hoje)
    .single();

  console.log(data);
  console.log(error);

  if (error) {

    document.getElementById(
      "santoDoDia"
    ).innerHTML =
      "Santo não encontrado";

    return;
  }

  document.getElementById(
    "santoDoDia"
  ).innerHTML = `
      <h2>${data.titulo}</h2>
      <p>${data.texto}</p>
  `;
}
