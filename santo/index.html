<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Santo do Dia - Supabase</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}

.card{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h2{
    margin-top:0;
}

.texto{
    white-space:pre-line;
    line-height:1.6;
}

button{
    margin-top:15px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#0b5ed7;
    color:white;
    cursor:pointer;
}

</style>
</head>
<body>

<div id="santoDoDia" class="card">
    Carregando...
</div>

<script src="https://cdn.jsdelivr.net/npm/abase-js@2>

<script>

const supabase = window.supabase.createClient(
    "https://fmyxypykokxfeojmdsuu.supabase.co",
    "COLE_AQUI_SUA_ANON_KEY"
);

async function carregarSanto() {

    const hoje =
        new Date().toISOString().split("T")[0];

    const { data, error } = await supabase
        .from("santos_do_dia")
        .select("*")
        .eq("data", hoje)
        .single();

    console.log(data);
    console.log(error);

    if (error || !data) {

        document.getElementById("santoDoDia").innerHTML = `
            <h2>Santo do Dia</h2>
            <p>Nenhum registro encontrado.</p>
        `;

        return;
    }

    const resumo =
        data.texto.substring(0, 1000) + "...";

    document.getElementById("santoDoDia").innerHTML = `
        <h2>${data.titulo}</h2>

        <p>
            <strong>Data:</strong>
            ${data.data}
        </p>

        <div id="textoSanto" class="texto">
            ${resumo}
        </div>

        <button id="btnExpandir">
            Ler mais
        </button>
    `;

    document
        .getElementById("btnExpandir")
        .addEventListener("click", () => {

            document.getElementById(
                "textoSanto"
            ).innerHTML =
                data.texto;

            document
                .getElementById(
                    "btnExpandir"
                )
                .remove();

        });
}

carregarSanto();

</script>

</body>
</html>
