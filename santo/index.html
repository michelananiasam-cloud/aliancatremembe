<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santo do Dia</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
    margin:0;
}

.card{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h2{
    margin-top:0;
    color:#333;
}

.data{
    color:#666;
    margin-bottom:15px;
}

.texto{
    white-space:pre-wrap;
    line-height:1.7;
    color:#444;
}

button{
    margin-top:15px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#0b5ed7;
    color:#fff;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

.erro{
    color:#c00;
    white-space:pre-wrap;
}
</style>

</head>
<body>

<div id="santoDoDia" class="card">
    Carregando Santo do Dia...
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://fmyxypykokxfeojmdsuu.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZteXh5cHlrb2t4ZmVvam1kc3V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4OTgyMjEsImV4cCI6MjA5NjQ3NDIyMX0.zPk_8i1-OmAie9HPdhLZc18cTa1dyy_kuWJibsiwmAQ";

const supabase = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function carregarSanto(){

    const container = document.getElementById("santoDoDia");

    try{

        // Data no formato YYYY-MM-DD
        const hoje = new Date().toISOString().split("T")[0];

        console.log("Buscando data:", hoje);

        const { data, error } = await supabase
            .from("santos_do_dia")
            .select("*")
            .eq("data", hoje)
            .maybeSingle();

        console.log("Resultado:", data);
        console.log("Erro:", error);

        if(error){
            throw error;
        }

        if(!data){

            container.innerHTML = `
                <h2>🙏 Santo do Dia</h2>
                <p>Nenhum santo cadastrado para hoje (${hoje}).</p>
            `;

            return;
        }

        const texto = data.texto || "";
        const titulo = data.titulo || "Sem título";

        const resumo =
            texto.length > 1000
                ? texto.substring(0,1000) + "..."
                : texto;

        container.innerHTML = `
            <h2>🙏 ${titulo}</h2>

            <div class="data">
                <strong>Data:</strong> ${data.data}
            </div>

            <div id="textoSanto" class="texto">
                ${resumo}
            </div>

            ${
                texto.length > 1000
                ? '<button id="btnExpandir">Ler mais</button>'
                : ''
            }
        `;

        const botao = document.getElementById("btnExpandir");

        if(botao){

            botao.addEventListener("click", ()=>{

                document.getElementById("textoSanto").innerHTML = texto;

                botao.remove();

            });

        }

    }catch(err){

        console.error(err);

        container.innerHTML = `
            <div class="erro">
                <h2>Erro ao consultar o Supabase</h2>

                <p><strong>Mensagem:</strong></p>

                <pre>${err.message || JSON.stringify(err,null,2)}</pre>
            </div>
        `;

    }

}

carregarSanto();

</script>

</body>
</html>
