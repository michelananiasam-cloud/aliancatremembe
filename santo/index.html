<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teste Santo do Dia</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}

.card{
    background:white;
    max-width:900px;
    margin:auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

button{
    margin-top:15px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#0b5ed7;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

pre{
    white-space:pre-wrap;
}

</style>
</head>
<body>

<div id="resultado" class="card">
    Carregando...
</div>

<script>

async function carregarSantoDoDia() {

    try {

        const response = await fetch(
            "https://api-liturgia-diaria.vercel.app/santo-do-dia"
        );

        console.log("Status:", response.status);

        const json = await response.json();

        console.log(json);

        const santo = json.today;

        const resumo =
            santo.full_text.substring(0, 600) + "...";

        document.getElementById("resultado").innerHTML = `
            <h2>🙏 Santo do Dia</h2>

            <h3>${santo.title}</h3>

            <p>
                <strong>Data:</strong>
                ${santo.day}/${santo.month}/${santo.year}
            </p>

            <div id="textoSanto">
                ${resumo.replace(/\n/g,"<br>")}
            </div>

            <button id="btnExpandir">
                Ler mais
            </button>
        `;

        document
            .getElementById("btnExpandir")
            .addEventListener("click", () => {

                document.getElementById(
                    "textoSanto"
                ).innerHTML =
                    santo.full_text.replace(
                        /\n/g,
                        "<br>"
                    );

                document
                    .getElementById(
                        "btnExpandir"
                    )
                    .remove();
            });

    }
    catch(error) {

        console.error(error);

        document.getElementById(
            "resultado"
        ).innerHTML = `
            <h2>Erro</h2>

            <pre>${error}</pre>

            <p>
                Verifique o console (F12)
            </p>
        `;
    }
}

carregarSantoDoDia();

</script>

</body>
</html>
