<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EngajaKum</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

/* FUNDO */
body {
  background: #f0f2f5;
  height: 100vh;
}

/* LAYOUT */
.wrapper {
  display: flex;
  height: 100vh;
}

.left, .right {
  width: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== ESQUERDA ===== */
.content-left {
  display: flex;
  align-items: center;
  gap: 12px;
  transform: translateX(40px);
}

.text {
  font-size: 56px;
  line-height: 1.1;
  font-weight: 700;
  color: #1c1e21;
}

.text span {
  color: #1877f2;
}

.text-wrapper {
  display: flex;
  flex-direction: column;
}

/* AUTOR */
.author {
  font-size: 22px;
  color: #000;
  margin-top: 6px;
}

/* LOGO */
.logo-hero {
  width: 250px;
  filter: drop-shadow(0 10px 25px rgba(0,0,0,0.2));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0); }
}

/* ===== DIREITA ===== */
.login-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.login-container {
  width: 360px;
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  transition: background 0.2s;
}

.login-container:hover {
  background: #f7f8fa;
}

/* TÍTULO */
h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #1877f2;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #dddfe2;
  font-size: 16px;
  transition: 0.2s;
}

/* hover escuro */
input:hover {
  border-color: #666;
}

input:focus {
  border-color: #1877f2;
  outline: none;
  box-shadow: 0 0 0 2px rgba(24,119,242,0.2);
}

/* BOTÕES */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  border: none;
  transition: all 0.15s ease;
}

.btn:active {
  transform: scale(0.96);
}

/* PRINCIPAL */
.btn-primary {
  background: linear-gradient(90deg, #1877f2, #166fe5);
  color: white;
  margin-bottom: 10px;
}

.btn-primary:hover {
  filter: brightness(0.95);
}

/* SECUNDÁRIO */
.btn-outline {
  border: 1px solid #1877f2;
  color: #1877f2;
  background: transparent;
}

.btn-outline:hover {
  background: #f2f3f5;
}

/* ✅ ESQUECEU SENHA (AGORA IGUAL AOS BOTÕES) */
.link {
  display: block;
  text-align: center;
  margin: 15px 0;

  padding: 14px;
  border-radius: 25px;

  color: #1877f2;
  text-decoration: none;

  border: 1px solid transparent;

  transition: all 0.15s ease;
}

.link:hover {
  background: #f2f3f5;
  border-color: #f2f3f5;
}

/* ✅ EFEITO DE CLIQUE (NOVO) */
.link:active {
  transform: scale(0.96);
  background: #e4e6eb;
}

/* FOOTER */
.footer {
  margin-top: 15px;
  font-size: 14px;
  color: #606770;
  text-align: center;
}

/* MOBILE */
@media (max-width: 900px) {
  .wrapper {
    flex-direction: column;
  }

  .left, .right {
    width: 100%;
  }

  .content-left {
    flex-direction: column;
    text-align: center;
    transform: none;
  }

  .text {
    font-size: 32px;
  }

  .logo-hero {
    width: 180px;
  }

  .author {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- ESQUERDA -->
  <div class="left">
    <div class="content-left">

      <div class="text-wrapper">
        <div class="text">
          "Só amamos <br>
          aquilo que <br>
          <span>conhecemos"</span>
        </div>

        <div class="author">
          - Santo Agostinho
        </div>
      </div>

      <img 
        src="https://misericordia.com.br/wp-content/uploads/2023/08/alianca_logo-header.png"
        class="logo-hero"
      >

    </div>
  </div>

  <!-- DIREITA -->
  <div class="right">

    <div class="login-wrapper">

      <div class="login-container">

        <h2>Entrar no EngajaKum</h2>

        <form>
          <input type="email" placeholder="Email">
          <input type="password" placeholder="Senha">

          <button class="btn btn-primary">Entrar</button>

          <a href="#" class="link">Esqueceu a senha?</a>

          <button type="button" class="btn btn-outline">
            Criar nova conta
          </button>
        </form>

      </div>

      <div class="footer">
     <p>
      <strong>Aliança de Misericórdia</strong> | Movimento Tremembé<br>
      <small>© 2026 • Desenvolvido com ❤️ por Michel Ananias</small>
    </p>
      </div>

    </div>

  </div>

  </div>

</body>
</html>
