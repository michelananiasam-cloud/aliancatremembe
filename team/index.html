<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Equipes Movimento Tremembé</title>

  <link rel="icon"
        href="https://misericordia.com.br/wp-content/uploads/2019/11/16x16px.png"
        type="image/png" />

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="team.css">

  <!-- ✅ Biblioteca (APENAS UMA VEZ) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js" defer></script>

  <!-- ✅ Seu app -->
  <script src="team.js" defer></script>

</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div id="web-header" role="banner" aria-label="Topo">
    <a href="../" class="logo-link">
      <img src="https://misericordia.com.br/wp-content/uploads/2023/08/alianca_logo-header.png"
           alt="Logo da Aliança">
    </a>

    <h1 id="titulo-web">Equipes Movimento Tremembé</h1>
  </div>

  <!-- PRINT HEADER -->
  <div id="print-header">
    <img src="https://misericordia.com.br/wp-content/uploads/2023/08/alianca_logo-header.png"
         alt="Logo da Aliança">
    <h2 id="print-title">Equipes Movimento Tremembé</h2>
  </div>

  <!-- FORM -->
  <section id="form-bloco" aria-label="Cadastro e Edição">

    <button id="toggle-form" class="toggle-form-btn">-</button>

    <div id="form-bloco-inner">

      <!-- PESSOAS -->
      <div class="card">
        <div class="card-title">
          <span class="badge">Coord. e Referências</span>
        </div>

        <div class="field">
          <label for="chave-area">Área</label>
          <select id="chave-area">
            <option value="coordenacao">Coordenação (responsáveis)</option>
            <option value="interna">Interna (responsáveis)</option>
            <option value="externa">Externa (responsáveis)</option>
            <option value="apoio">Apoio (responsáveis)</option>
          </select>
        </div>

        <div class="field">
          <label for="chave-nome">Nome</label>
          <input id="chave-nome" type="text" placeholder="Nome da pessoa">
        </div>

        <button class="primary" id="btn-add-chave">Adicionar Pessoa‑chave</button>
      </div>

      <!-- EQUIPES -->
      <div class="card">
        <div class="card-title">
          <span class="badge">Equipes</span>
        </div>

        <div class="field">
          <label for="eq-ref">Vincular em</label>
          <select id="eq-ref">
            <option value="interna">Interna</option>
            <option value="externa">Externa</option>
            <option value="apoio">Apoio</option>
          </select>
        </div>

        <div class="field">
          <label for="eq-nome">Equipe</label>
          <input id="eq-nome" type="text" placeholder="Ex.: Acolhida">
        </div>

        <div class="field">
          <label for="eq-pessoa">Servo</label>
          <input id="eq-pessoa" type="text" placeholder="Ex.: Maria">
        </div>

        <div class="field" style="flex-direction:row; align-items:center; gap:8px;">
          <input id="eq-marcar-ref" type="checkbox" style="width:auto;">
          <label for="eq-marcar-ref">
            Marcar como <b>referência</b>?
          </label>
        </div>

        <button class="primary" id="btn-add-equipe">
          Adicionar / Atualizar Equipe
        </button>
      </div>

    </div>
  </section>

  <!-- ÁREA PRINCIPAL -->
  <section id="org" aria-live="polite"></section>

  <!-- PRINT -->
  <section id="print-lists" class="print-only"></section>

</div>

<!-- BOTÃO MOBILE -->
<button id="btn-atualizar-mobile" type="button">
  🔄 Atualizar
</button>

<!-- RODAPÉ -->
<div id="menu-rodape">
  <form class="menu-rodape-content" id="form-rodape">

    <div class="field-inline">
      <label for="evangelizacao">Evangelização</label>
      <input id="evangelizacao" type="text">
    </div>

    <div class="rodape-actions">

      <button type="submit" class="btn_rodape brand">
        Alterar Evangelização
      </button>

      <button id="btn-atualizar" type="button" class="btn_rodape">
        Atualizar
      </button>

      <button id="btn-export-mermaid" type="button" class="btn_rodape">
        Mermaid
      </button>

      <button id="btn-export-json" type="button" class="btn_rodape">
        Export
      </button>

      <button id="btn-import-json" type="button" class="btn_rodape">
        Import
      </button>

      <input type="file" id="input-import-json" hidden>
    </div>

  </form>
</div>

<div class="watermark">EM DESENVOLVIMENTO</div>

<!-- ✅ MODAL -->
<div id="custom-modal" style="display:none;">
  <div class="modal-box">

    <img src="https://misericordia.com.br/wp-content/uploads/2023/08/alianca_logo-header.png"
         class="modal-logo">

    <h3 id="modal-title">Confirmação</h3>
    <p id="modal-text"></p>

    <div class="modal-actions">
      <button id="modal-cancel">Cancelar</button>
      <button class="primary" id="modal-confirm">OK</button>
    </div>

  </div>
</div>

</body>
